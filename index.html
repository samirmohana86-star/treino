  card.querySelector(".ex-top").onclick=function(){ d.open=!d.open; persist(); card.replaceWith(renderEx(e,idx,true)); };

  renderSetList(card,e,d,ll);
  return card;
}

/* séries realizadas da última vez que este exercício apareceu (qualquer sessão) — para o "últ.:" por série */
function prevSetsFor(id){
  for(let i=history.length-1;i>=0;i--){
    const h=history[i]; if(draft && h.date===draft.date) continue;
    const e=h.ex&&h.ex[id]; if(!e) continue;
    if(Array.isArray(e.sets)){ const w=e.sets.filter(s=>!s.w&&(s.peso||s.reps||s.esf)); if(w.length) return {sets:w,date:h.date}; }
    else if(e.carga||e.reps) return {sets:[{peso:e.carga||"",reps:e.reps||"",esf:""}],date:h.date};
  }
  return null;
}
function renderSetList(card,e,d,ll){
  const list=card.querySelector(".setlist");
  const winc=d.winc||2.5;
  const prev=prevSetsFor(e.id);
  let wn=0, pw=0;
  list.innerHTML=d.sets.map((s,si)=>{
    const tag=s.w?"W":(s.t==="d"?"D":(s.t==="f"?"F":(++wn)));
    const pi=s.w?0:++pw;
    const ps=(!s.w&&prev&&prev.sets[pi-1])?prev.sets[pi-1]:null;
    const cls=s.w?" warm":(s.t==="d"?" drop":(s.t==="f"?" fail":""));
    let gP=""; for(let j=si-1;j>=0;j--){ if(d.sets[j].peso){ gP=d.sets[j].peso; break; } } if(!gP && ll && ll.carga) gP=ll.carga;
    let gR=""; for(let j=si-1;j>=0;j--){ if(d.sets[j].reps){ gR=d.sets[j].reps; break; } }
    const pesoDisp = s.peso ? (s.peso+' <span class="u">kg</span>') : ('<span class="ghost">'+(gP||'–')+'</span> <span class="u">kg</span>');
    const repsDisp = s.reps ? s.reps : ('<span class="ghost">'+(gR||'–')+'</span>');
    const esfOn = s.esf!=="" && s.esf!=null;
    return `<div class="setblk${s.done?" done":""}${cls}" data-si="${si}">
      <div class="setblk-a">
        <button class="settag" data-sa="type" title="tipo da série">${tag}</button>
        <div class="stp">
          <button class="stp-b" data-stp="peso:-1">−</button>
          <button class="stp-v" data-copy="peso">${pesoDisp}</button>
          <button class="stp-b" data-stp="peso:1">+</button>
        </div>
        <div class="stp">
          <button class="stp-b" data-stp="reps:-1">−</button>
          <button class="stp-v" data-copy="reps">${repsDisp}</button>
          <button class="stp-b" data-stp="reps:1">+</button>
        </div>
        <button class="setdone${s.done?" on":""}" data-sa="done"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="setdel" data-sa="del" aria-label="remover">×</button>
      </div>
      ${ps?`<div class="setprev">últ.: ${esc(ps.peso||"—")} kg × ${esc(ps.reps||"—")}${(ps.esf!==""&&ps.esf!=null)?" · esf "+esc(ps.esf):""}</div>`:""}
      <div class="valstrip hide" data-vstrip></div>
      <div class="setblk-b">
        <button class="esfchip" data-sa="esf">${esfOn?('<span class="dotc" style="background:'+esfColor(s.esf)+'"></span>Esforço '+s.esf):'<span class="dotc"></span>Esforço'}</button>
      </div>
      <div class="esfscale hide" data-scale>${Array.from({length:11},(_,v)=>'<button class="esfb'+((esfOn&&+s.esf===v)?" on":"")+'" data-esf="'+v+'" style="background:'+esfColor(v)+'">'+v+'</button>').join("")}</div>
    </div>`;
  }).join("");

  let lastRest=null; d.sets.forEach(s=>{ if(s.rest!=null) lastRest=s.rest; });
  card.querySelector(".rused").textContent = lastRest!=null ? ("· última "+fmtRest(lastRest)) : "";
  const pr=card.querySelector(".prbadge");
  if(pr){ const curTop=Math.max(0,...d.sets.filter(s=>!s.w).map(s=>numOf(s.peso))); const best=bestFor(e.id); pr.style.display=(best!=null && curTop>0 && curTop>best)?"inline-flex":"none"; }
  card.querySelectorAll('[data-winc]').forEach(b=>b.classList.toggle("on", parseFloat(b.dataset.winc)===winc));

  const rerender=()=>{ persist(); renderSetList(card,e,d,ll); card.classList.toggle("done", d.sets.length>0 && d.sets.every(x=>x.done)); updateFinishBar(); };
  const ghostOf=(si,field)=>{ for(let j=si-1;j>=0;j--){ if(d.sets[j][field]) return d.sets[j][field]; } return (field==="peso" && ll && ll.carga)? ll.carga : ""; };

  list.querySelectorAll("[data-stp]").forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si; const p=btn.dataset.stp.split(":"); const field=p[0], dir=parseInt(p[1],10);
    btn.onclick=()=>{
      const s=d.sets[si], step=field==="peso"?(d.winc||2.5):1;
      if(s[field]==="" || s[field]==null){ const g=ghostOf(si,field); s[field]= g ? String(g) : (dir>0? (field==="peso"?fmtNum(step):"1") : "0"); }
      else { const v=Math.max(0, numOf(s[field]) + dir*step); s[field]=field==="peso"?fmtNum(v):String(Math.round(v)); }
      if(field==="reps") delete s.pre; // usuário mexeu: reps agora é registro real
      persist(); renderSetList(card,e,d,ll); updateFinishBar();
    };
  });
  list.querySelectorAll("[data-copy]").forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si, field=btn.dataset.copy;
    btn.onclick=()=>{ // abre/fecha a régua de rolagem
      if(openStrip && openStrip.ex===e.id && openStrip.si===si && openStrip.field===field) openStrip=null;
      else openStrip={ex:e.id,si:si,field:field};
      renderSetList(card,e,d,ll);
    };
  });
  list.querySelectorAll('[data-sa="esf"]').forEach(btn=>{
    btn.onclick=()=>{ btn.closest(".setblk").querySelector("[data-scale]").classList.toggle("hide"); };
  });
  list.querySelectorAll("[data-esf]").forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si;
    btn.onclick=()=>{ const s=d.sets[si], v=btn.dataset.esf; s.esf=(s.esf===v?"":v); persist(); renderSetList(card,e,d,ll); };
  });
  list.querySelectorAll('[data-sa="type"],[data-sa="done"],[data-sa="del"]').forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si, act=btn.dataset.sa;
    btn.onclick=()=>{
      const s=d.sets[si];
      if(act==="type"){ if(!s.w && !s.t){ s.w=true; } else if(s.w){ s.w=false; s.t="d"; } else if(s.t==="d"){ s.t="f"; } else { s.t=""; } }
      else if(act==="del"){ d.sets.splice(si,1); if(d.sets.length===0) d.sets.push(newSet(false));
        if(openStrip&&openStrip.ex===e.id){ if(openStrip.si===si) openStrip=null; else if(openStrip.si>si) openStrip.si--; } } // régua acompanha o índice
      else if(act==="done"){
        s.done=!s.done;
        if(s.done){ const now=Date.now(); if(activeRest && activeRest.id===e.id) s.rest=Math.round((now-activeRest.ts)/1000); activeRest={id:e.id,ts:now}; startRestCountdown(restSeconds(e.rest));
          const c=cronoState(); if(!c.run && c.el===0 && !c.ts){ c.ts=now; c.run=true; } } // 1ª série ✓ dá o start se esqueceu
        else { s.rest=null; if(activeRest && activeRest.id===e.id) activeRest=null; rcdSkip(); }
      }
      rerender();
    };
  });
  card.querySelector('[data-act="addset"]').onclick=function(){ const s=newSet(false); const tr=topReps(adjTarget(e).rr); if(tr){ s.reps=String(tr); s.pre=true; } d.sets.push(s); rerender(); };
  card.querySelector('[data-act="warmcalc"]').onclick=function(){
    if(openStrip&&openStrip.ex===e.id) openStrip=null; // unshift desloca índices — fecha a régua
    const top=Math.max(0,...d.sets.filter(s=>!s.w && !s.t).map(s=>numOf(s.peso)));
    if(top>0){ const a=newSet(true); a.peso=fmtNum(Math.max(1,Math.round(top*0.7))); const b=newSet(true); b.peso=fmtNum(Math.max(1,Math.round(top*0.5))); d.sets.unshift(a); d.sets.unshift(b); }
    else { d.sets.unshift(newSet(true)); }
    rerender();
  };
  card.querySelectorAll('[data-winc]').forEach(b=>{ b.onclick=function(){ d.winc=parseFloat(b.dataset.winc); persist(); renderSetList(card,e,d,ll); }; });
  if(openStrip && openStrip.ex===e.id && d.sets[openStrip.si]) buildValStrip(card,e,d,ll,openStrip.si,openStrip.field);
}

/* régua de rolagem para escolher kg/reps (abre ao tocar no valor) */
function buildValStrip(card,e,d,ll,si,field){
  const blk=card.querySelector('.setblk[data-si="'+si+'"]'); if(!blk) return;
  const strip=blk.querySelector('[data-vstrip]'); if(!strip) return;
  // só uma régua aberta por vez: esvazia e esconde as outras (mesmo em cards que não foram re-renderizados)
  document.querySelectorAll("[data-vstrip]").forEach(x=>{ if(x!==strip){ x.classList.add("hide"); x.innerHTML=""; } });
  const s=d.sets[si];
  const ghost=(f)=>{ for(let j=si-1;j>=0;j--){ if(d.sets[j][f]) return d.sets[j][f]; } return (f==="peso" && ll && ll.carga)? ll.carga : ""; };
  const step=field==="peso"?(d.winc||2.5):1;
  const hasVal=(s[field]!=="" && s[field]!=null);
  const cur=numOf(hasVal?s[field]:ghost(field));
  const min=field==="peso"?0:1;
  const max=Math.max(field==="peso"?150:30, Math.ceil(cur/step)*step+10*step);
  const fmt=v=>field==="peso"?fmtNum(v):String(Math.round(v));
  let html="";
  for(let v=min;v<=max+1e-9;v+=step){ const val=fmt(v); html+='<button class="vs-it'+((hasVal&&numOf(val)===cur)?" on":"")+'" data-val="'+val+'">'+val+'</button>'; }
  strip.innerHTML=html; strip.classList.remove("hide");
  const setVal=(val)=>{ s[field]=val; if(field==="reps") delete s.pre; };
  strip.querySelectorAll(".vs-it").forEach(b=>b.onclick=()=>{ setVal(b.dataset.val); openStrip=null; persist(); renderSetList(card,e,d,ll); updateFinishBar(); });
  // centraliza o valor atual (ou o fantasma); se estiver fora da grade do passo, centraliza o mais próximo
  let target=strip.querySelector(".vs-it.on");
  if(!target && cur>0){ let bd=1e9; for(const ch of strip.children){ const dd=Math.abs(numOf(ch.dataset.val)-cur); if(dd<bd){ bd=dd; target=ch; } } }
  requestAnimationFrame(()=>{ const t=target||strip.children[Math.min(4,strip.children.length-1)]; if(t) strip.scrollLeft=t.offsetLeft-strip.clientWidth/2+t.offsetWidth/2; });
  // rolar também escolhe: só depois de o USUÁRIO tocar/rolar a régua (nunca pelo scroll programático/snap inicial)
  let tm=null, armed=false;
  ["touchstart","pointerdown","mousedown","wheel"].forEach(ev=>strip.addEventListener(ev,()=>{ armed=true; },{passive:true}));
  strip.addEventListener("scroll",()=>{ if(!armed) return; clearTimeout(tm); tm=setTimeout(()=>{
    const cx=strip.scrollLeft+strip.clientWidth/2; let best=null,bd=1e9;
    for(const ch of strip.children){ const c=ch.offsetLeft+ch.offsetWidth/2, dd=Math.abs(c-cx); if(dd<bd){bd=dd;best=ch;} }
    if(best && best.dataset.val!==String(s[field])){
      setVal(best.dataset.val); persist(); updateFinishBar();
      strip.querySelectorAll(".vs-it").forEach(x=>x.classList.toggle("on",x===best));
      const vbtn=blk.querySelector('[data-copy="'+field+'"]');
      if(vbtn) vbtn.innerHTML=field==="peso"?(esc(s[field])+' <span class="u">kg</span>'):esc(s[field]);
    }
  },150); },{passive:true});
}

function hasLoggedData(d){ return !!(d&&d.ex)&&Object.keys(d.ex).some(id=>{ const e=d.ex[id]; return Array.isArray(e.sets)&&e.sets.some(s=>s.done||s.peso||s.esf||(s.reps&&!s.pre)); }); } // reps pré-preenchida (s.pre) não conta
function switchSession(k){
  if(!draft){ ensureDraft(); }
  if(draft.session===k) return;
  const go=function(){
    const keep={ date:draft.date, created:draft.created, autoreg:draft.autoreg, peso:draft.peso, gym:draft.gym, meals:draft.meals, kcal:draft.kcal, bpm:draft.bpm, crono:draft.crono }; // check-in do dia e cronômetro sobrevivem à troca
    draft=freshDraft(k);
    Object.assign(draft, keep);
    persist(); renderHoje();
  };
  if(hasLoggedData(draft)){ appConfirm("Você já registrou séries nesta sessão. Trocar de treino vai apagar o registro de hoje.",go); return; }
  go();
}

/* ---------- cronômetro do treino (Iniciar → Pausar/Retomar; duração vai pro registro) ---------- */
function cronoState(){ if(!draft.crono||typeof draft.crono!=="object") draft.crono={el:0,run:false,ts:null}; return draft.crono; }
function cronoElapsed(){ const c=cronoState(); return Math.max(0,Math.round(c.el + (c.run&&c.ts ? (Date.now()-c.ts)/1000 : 0))); }
function cronoToggle(){
  const c=cronoState();
  if(c.run){ c.el=cronoElapsed(); c.run=false; c.ts=null; }   // pausa
  else { c.ts=Date.now(); c.run=true; }                        // inicia / retoma
  persist(); updateFinishBar();
}
function fmtCrono(s){ s=Math.max(0,Math.round(s)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return (h?h+":"+String(m).padStart(2,"0"):String(m))+":"+String(ss).padStart(2,"0"); }
function fmtDur(s){ const m=Math.round(s/60); if(m<1) return Math.round(s)+"s"; if(m<60) return m+" min"; return Math.floor(m/60)+"h"+String(m%60).padStart(2,"0"); }
function cronoTick(){ if(currentTab!=="hoje"||!draft||!draft.crono||!draft.crono.run) return; const bc=$("#btnCrono"); if(bc) bc.textContent="⏸ "+fmtCrono(cronoElapsed()); }

/* confirmação em folha (confirm() também não aparece no PWA standalone do iOS) */
let sheetOnDismiss=null; // appConfirm pendente: fechar por scrim/gesto = Cancelar (senão Promises de consentimento ficam penduradas pra sempre)

function updateFinishBar(){
  const bar=$("#finishbar");
  if(currentTab!=="hoje"){ bar.classList.add("hidden"); return; }
  bar.classList.remove("hidden");
  let total=0,doneN=0;
  if(!(draft.autoreg==="r"&&draft.z2only)){
    const full=sessExList(draft.session);
    const list=draft.autoreg==="r"?full.slice(0,3):full;
    list.forEach(e=>{
      const d=draft.ex[e.id];
      if(d && Array.isArray(d.sets)){ const work=d.sets.filter(s=>!s.w); total+=work.length; doneN+=work.filter(s=>s.done).length; }
      else { total+=adjTarget(e).sets; }
    });
  }
  const cnt=$("#exCount"); if(cnt) cnt.textContent=doneN+"/"+total+" séries";
  const fill=$("#pbarFill"); if(fill) fill.style.width=(total?(doneN/total*100):100)+"%";
  $("#finMeta").innerHTML = draft.z2only?`<b>Zona 2</b>`:`<b>${doneN}</b>/${total} séries`;
  const bc=$("#btnCrono");
  if(bc){ const c=cronoState(); const started=c.run||c.el>0;
    bc.className="btn-crono"+(c.run?" run":(started?" paused":""));
    bc.textContent=c.run ? "⏸ "+fmtCrono(cronoElapsed()) : (started ? "▶ "+fmtCrono(c.el) : "▶ Iniciar");
  }
}

/* ============================================================
   FINALIZAR & EXPORTAR
   ============================================================ */
function cell(s){ return String(s==null?"":s).replace(/\|/g,"/").replace(/\r?\n/g," ").trim(); }

/* ---------- resumo do treino: séries, volume, comparativo, músculos, nota 0–10 ---------- */
function workSetsOf(rec){ let total=0,done=0; Object.values(rec.ex||{}).forEach(d=>{ if(Array.isArray(d.sets)) d.sets.forEach(s=>{ if(!s.w){ total++; if(s.done) done++; } }); }); return {total:total,done:done}; }
function volumeOf(rec){ let v=0; Object.values(rec.ex||{}).forEach(d=>{ if(Array.isArray(d.sets)) d.sets.forEach(s=>{ if(!s.w&&s.done) v+=numOf(s.peso)*numOf(s.reps); }); }); return Math.round(v); }
function topSetOf(d){ if(!d) return null; if(!Array.isArray(d.sets)) return (d.carga||d.reps)?{peso:d.carga||"",reps:d.reps||""}:null; /* formato antigo */ let best=null; d.sets.forEach(s=>{ if(!s.w&&(s.done||s.esf)&&(s.peso||s.reps)&&(!best||numOf(s.peso)>numOf(best.peso))) best=s; }); return best; } // só séries realizadas (✓/esforço) contam
function prevSameSession(rec){ let prev=null; history.forEach(h=>{ if(h.session===rec.session&&h.date<rec.date&&(!prev||h.date>prev.date)) prev=h; }); return prev; }
function musclesOf(rec){ const g={}; Object.entries(rec.ex||{}).forEach(([id,d])=>{ if(!Array.isArray(d.sets)) return; const n=d.sets.filter(s=>!s.w&&s.done).length; if(!n) return; const grp=(EXMETA[id]||{}).g||"outro"; g[grp]=(g[grp]||0)+n; }); return g; }
function prCount(rec){
  let n=0;
  Object.entries(rec.ex||{}).forEach(([id,d])=>{
    const t=topSetOf(d); if(!t) return; const cur=numOf(t.peso); if(cur<=0) return;
    let best=0,has=false;
    history.forEach(h=>{ if(h.date>=rec.date) return; const e=h.ex&&h.ex[id]; if(!e) return;
      if(Array.isArray(e.sets)) e.sets.forEach(s=>{ if(!s.w&&(s.done||s.esf)){ const p=numOf(s.peso); if(p>0){ has=true; if(p>best) best=p; } } });
      else if(e.carga){ const p=numOf(e.carga); if(p>0){ has=true; if(p>best) best=p; } } });
    if(has&&cur>best) n++;
  });
  return n;
}
function scoreWorkout(rec){
  const prev=prevSameSession(rec), ws=workSetsOf(rec);
  const comp=rec.z2only?1:(ws.total?ws.done/ws.total:0);
  let sc=comp*5;                                 // conclusão das séries (0–5)
  let prog=2;                                    // progressão vs mesma sessão (0–3; 2 = neutro, sem comparação)
  if(prev && !rec.z2only){ const v0=volumeOf(prev), v1=volumeOf(rec);
    if(v0>0){ const dl=(v1-v0)/v0; prog=dl>=0.05?3:(dl>0?2.6:(dl>=-0.02?2.2:(dl>=-0.08?1.5:1))); } }
  sc+=prog;
  sc+=(rec.warmDone?0.6:0)+(rec.coreDone?0.7:0)+(rec.cardioDone?0.7:0); // extras (0–2)
  if(prCount(rec)>0) sc+=0.5;                    // bônus de recorde
  return Math.max(0,Math.min(10,Math.round(sc*10)/10));
}
function buildMarkdown(rec){
  const sess=PROGRAM[rec.session];
  const arName={v:"🟢 Verde",a:"🟡 Amarelo",r:"🔴 Vermelho","":"—"};
  const wd=WD_NAMES[new Date(rec.date.replace(/-/g,"/")).getDay()];
  let md=`# Treino — ${rec.date} (${wd}) · ${sess.name}\n\n`;
  md+=`> ${sess.sub} · Bloco ${rec.block||currentBlock().n} · semana ${rec.week||currentWeek()}\n\n`;
  // check-in line
  const ci=[];
  ci.push(`**Autorregulação:** ${arName[rec.autoreg||""]}`);
  if(rec.gym) ci.push(`**Academia:** ${rec.gym}`);
  if(rec.peso) ci.push(`**Peso:** ${rec.peso} kg`);
  if(rec.sonoH||rec.sonoQ) ci.push(`**Sono:** ${rec.sonoH?rec.sonoH+"h":""}${rec.sonoQ?" ("+rec.sonoQ+")":""}`);
  if(rec.enjoo) ci.push(`**Enjoo:** ${rec.enjoo}`);
  if(rec.energia) ci.push(`**Energia:** ${rec.energia}`);
  if(rec.duracao) ci.push(`**Duração:** ${fmtDur(rec.duracao)}`);
  if(rec.kcal) ci.push(`**Calorias:** ${rec.kcal} kcal`);
  if(rec.bpm) ci.push(`**FC final:** ${rec.bpm} bpm`);
  md+=ci.join(" · ")+"\n\n";

  // resumo: nota, séries, volume vs sessão anterior, recordes, músculos
  const prevR=prevSameSession(rec), wsR=workSetsOf(rec), volR=volumeOf(rec), musR=musclesOf(rec), prsR=prCount(rec);
  // nota só quando o registro tem dados no formato por série (registros antigos {carga,reps} não têm base p/ nota)
  const scoreR=(rec.score!=null)?rec.score:((rec.z2only||wsR.total>0)?scoreWorkout(rec):null);
  if(scoreR!=null){
    let resumo=`**Nota do treino:** ${fmtNum(scoreR)}/10`;
    if(!rec.z2only && wsR.total){
      resumo+=` · **Séries:** ${wsR.done}/${wsR.total} · **Volume:** ${volR.toLocaleString("pt-BR")} kg`;
      if(prevR){ const v0=volumeOf(prevR); if(v0>0) resumo+=` (${volR>=v0?"+":""}${Math.round((volR-v0)/v0*100)}% vs ${prettyDate(prevR.date)})`; }
      if(prsR) resumo+=` · 🏆 ${prsR} recorde${prsR>1?"s":""}`;
    }
    md+=resumo+"\n";
  }
  const musE=Object.entries(musR);
  if(musE.length) md+=`**Músculos trabalhados:** ${musE.map(([g,n])=>`${g} ×${n} séries`).join(" · ")}\n`;
  if(scoreR!=null||musE.length) md+="\n";

  if(rec.autoreg==="r"&&rec.z2only){
    md+=`**Dia vermelho:** fiz só caminhada Zona 2${rec.cardioMin?` (${rec.cardioMin} min)`:""}. Treino de força não realizado.\n\n`;
  }else{
    const merged=sessExList(rec.session);
    const list=rec.autoreg==="r"?merged.slice(0,3):merged;
    // anexa exercícios REGISTRADOS que saíram do plano atual (removidos/custom apagado) — o .md é o backup, nada pode sumir
    const inList=new Set(list.map(e=>e.id));
    Object.entries(rec.ex||{}).forEach(([id,d])=>{
      if(inList.has(id)||!d) return;
      const has=(Array.isArray(d.sets)&&d.sets.some(s=>s.peso||s.reps||s.done))||d.carga||d.reps;
      if(!has) return;
      const m=mergedEx(id)||{};
      list.push({id:id, orphan:true, n:(d.nm||m.n||(EXMETA[id]&&EXMETA[id].n)||id), alts:[], sets:m.sets||"?", rr:m.rr||"?", rir:m.rir||"?", rest:m.rest||"—", g:m.g||"outro"});
    });
    md+=`## Exercícios\n\n`;
    list.forEach((e,i)=>{
      const d=rec.ex[e.id];
      const alts=e.alts||[]; const ai=(d&&d.altIdx!=null)?d.altIdx:((d&&d.alt)?1:0);
      // preferir o nome CONGELADO no registro (d.nm) — edições futuras do plano não mudam treino passado
      let name=(d&&d.nm)?d.nm.replace(/ \(alt\.\)$/," _(alt.)_"):((ai>0&&alts[ai-1])?`${alts[ai-1]} _(alt.)_`:e.n);
      if(e.orphan) name+=" _(fora do plano atual)_";
      const tgt=(function(){const m=rec.autoreg;if(m==="r")return `2×${e.rr} RIR3`;if(m==="a")return `${Math.max(1,e.sets-1)}×${e.rr} RIR ${bumpRir(e.rir)}`;return `${e.sets}×${e.rr} RIR ${e.rir}`;})();
      md+=`### ${i+1}. ${name} — alvo ${tgt} · desc ${e.rest}\n\n`;
      if(d && Array.isArray(d.sets) && d.sets.length){
        md+=`| Série | Kg | Reps | Esf. | Desc. | ✓ |\n|---|---|---|---|---|---|\n`;
        let wn=0;
        d.sets.forEach(s=>{ const tag=s.w?"W":(s.t==="d"?"D":(s.t==="f"?"F":(++wn))); md+=`| ${tag} | ${s.peso?cell(s.peso):"—"} | ${s.reps?cell(s.reps):"—"} | ${s.esf?cell(s.esf):"—"} | ${s.rest!=null?fmtRest(s.rest):"—"} | ${s.done?"✅":"—"} |\n`; });
        md+="\n";
      } else if(d && (d.carga||d.reps)){ // formato antigo
        md+=`Carga ${d.carga||"—"} · reps ${d.reps||"—"}${d.rir?` · RIR ${d.rir}`:""}\n\n`;
      } else { md+=`_não registrado_\n\n`; }
      if(d && d.nota) md+=`Nota: ${cell(d.nota)}\n\n`;
    });
  }
  md+=`**Aquecimento/prehab:** ${rec.warmDone?"✅ feito":"—"}\n`;
  md+=`**Core:** ${sess.core.name} ${sess.core.scheme} — ${rec.coreDone?"✅ feito":"—"}\n`;
  if(!rec.z2only) md+=`**Cardio Zona 2:** ${rec.cardioDone?"✅ "+(rec.cardioMin?rec.cardioMin+" min":"feito"):"—"}\n`;
  md+="\n";
  if(rec.nota) md+=`**Como foi:** ${rec.nota}\n\n`;
  const ml=rec.meals;
  const logged=(ml&&Array.isArray(ml.logged))?ml.logged:[];
  if(ml && (ml.check||ml.extras||ml.aguaL||ml.creatina||logged.length)){
    let plan=0,cons=0; const eaten=[];
    MEAL_PLAN.forEach((meal,mi)=>meal.foods.forEach((f,fi)=>{ plan+=f.k; const key=mi+"-"+fi; if(ml.check&&ml.check[key]){ cons+=f.k; eaten.push(f.n+((ml.qadj&&ml.qadj[key])?` (${ml.qadj[key]})`:"")); } }));
    // total de macros dos itens registrados por texto/IA/código de barras
    const lt={kcal:0,prot:0,carb:0,gord:0,fib:0}; logged.forEach(it=>{ if(!it||typeof it!=="object") return; lt.kcal+=+it.kcal||0; lt.prot+=+it.prot||0; lt.carb+=+it.carb||0; lt.gord+=+it.gord||0; lt.fib+=+it.fib||0; });
    const parts=[];
    if(logged.length) parts.push(`proteína ${fmtNum(Math.round(lt.prot))}/${(+rec.protGoal||+settings.protGoal||170)} g`, `≈${Math.round(lt.kcal)} kcal registradas`);
    if(cons) parts.push(`plano ≈${cons}/${plan} kcal`);
    parts.push(`creatina ${ml.creatina?"✅":"—"}`);
    if(ml.aguaL) parts.push(`água ${ml.aguaL} L`);
    md+=`**Nutrição:** ${parts.join(" · ")}\n`;
    if(logged.length){ md+=`Registrado: ${logged.filter(it=>it&&typeof it==="object").map(it=>cell(it.nome+(it.q?" "+it.q:"")+` [${fmtNum(it.prot)}g P, ${Math.round(it.kcal)} kcal]`)).join("; ")}.\n`; }
    if(eaten.length) md+=`Comido do plano: ${eaten.map(cell).join(", ")}.\n`;
    if(ml.extras) md+=`Comi a mais: ${cell(ml.extras)}\n`;
    md+="\n";
  }
  md+=`---\n_Registrado pelo app Treino (PPL Spine-Safe). Para o Projeto Saúde — atualizar Painel (peso/treino) e Diário._\n`;
  // dados estruturados (invisível ao ler, fácil de processar). "--" escapado p/ nunca fechar o comentário; JSON.parse reverte - -> -
  md+=`\n<!-- TREINO_JSON ${JSON.stringify(rec).replace(/--/g,"\\u002d\\u002d")} -->\n`;
  return md;
}

function fileName(rec){ return `${rec.date} - ${PROGRAM[rec.session].name}.md`; }

function archiveDraft(){ // congela o draft atual e grava no histórico; retorna o registro (usado pelo Finalizar e pela virada do dia)
  // para o cronômetro e congela a duração
  const c=cronoState(); if(c.run){ c.el=cronoElapsed(); c.run=false; c.ts=null; persist(); updateFinishBar(); }
  // snapshot
  const rec=JSON.parse(JSON.stringify(draft));
  rec.duracao=(rec.crono&&rec.crono.el)?Math.round(rec.crono.el):null; delete rec.crono;
  rec.protGoal=+settings.protGoal||170;
  rec.block=currentBlock().n; rec.week=currentWeek();
  // limpa reps pré-preenchidas (s.pre) de séries não realizadas — reps escolhidas pelo usuário ficam, mesmo sem peso (ex.: exercício corporal)
  Object.values(rec.ex||{}).forEach(d=>{ delete d.open; if(Array.isArray(d.sets)) d.sets.forEach(s=>{ if(s.pre&&!s.done&&!s.peso&&!s.esf) s.reps=""; delete s.pre; }); });
  // grava o nome real usado (alternativa/exercício próprio) — histórico e Cowork ficam independentes de edições futuras do plano
  Object.keys(rec.ex||{}).forEach(id=>{ const m=mergedEx(id); if(m){ const d=rec.ex[id]; const ai=(d.altIdx!=null)?d.altIdx:(d.alt?1:0); d.nm=(ai>0&&(m.alts||[])[ai-1])?(m.alts[ai-1]+" (alt.)"):m.n; } });
  rec.score=scoreWorkout(rec);
  // grava/atualiza no histórico (substitui se já houver o mesmo dia+sessão)
  const i=history.findIndex(h=>h.date===rec.date&&h.session===rec.session);
  if(i>=0) history[i]=rec; else history.push(rec);
  save(LS_HIST,history);
  activeRest=null;
  return rec;
}

/* pós-finalizar: zera o treino na aba Hoje, preservando o que é do DIA (peso, academia, autorregulação, comida) */
function resetAfterFinish(){
  const keep={ date:draft.date, created:draft.created, autoreg:draft.autoreg, peso:draft.peso, gym:draft.gym, meals:draft.meals };
  draft=freshDraft(draft.session);
  Object.assign(draft, keep);

}
function finishWorkout(){
  const temAlgo=hasLoggedData(draft)||draft.z2only||(draft.crono&&(draft.crono.el>0||draft.crono.run));
  if(!temAlgo){ appInfo("Nada pra finalizar","Marque pelo menos uma série (ou registre o dia vermelho/Zona 2) antes de finalizar."); return; }
  const go=function(){ const rec=archiveDraft(); resetAfterFinish(); openExport(rec); };
  const jaTem=history.some(h=>h.date===draft.date&&h.session===draft.session);
  if(jaTem){ appConfirm("Você já finalizou "+(PROGRAM[draft.session]?PROGRAM[draft.session].name:draft.session)+" hoje — está no Histórico. Finalizar de novo SUBSTITUI aquele registro pelo de agora. (Pra corrigir um treino já finalizado, prefira o ✎ no Histórico.)",go); return; }
  go();
}

/* comparativo com o treino anterior da mesma sessão (folha de finalizar) */
function buildCompareHTML(rec){
  const prev=prevSameSession(rec);
  const rows=[];
  Object.entries(rec.ex||{}).forEach(([id,d])=>{
    const t=topSetOf(d); if(!t) return;
    const meta=EXMETA[id]||{}; const nm=String(d.nm||meta.n||id).replace(/ \(alt\.\)$/,"");
    const me=mergedEx(id); const stim=me?stimOf(me.rr):"";
    const p=(prev&&prev.ex&&prev.ex[id])?topSetOf(prev.ex[id]):null;
    let cls="eq", arrow="＝";
    if(p){ const dP=numOf(t.peso)-numOf(p.peso), dR=numOf(t.reps)-numOf(p.reps);
      if(dP>0||(dP===0&&dR>0)){ cls="up"; arrow="▲"; } else if(dP<0||(dP===0&&dR<0)){ cls="dn"; arrow="▼"; } }
    else { arrow="novo"; }
    rows.push(`<div class="cmp-row"><div class="cn">${esc(nm)}<span class="cm"> · ${esc(meta.g||"")}${stim?" · "+stim:""}</span></div><div class="cv">${p?(esc(p.peso||"—")+"kg×"+esc(p.reps||"—")):"—"} → <b>${esc(t.peso||"—")}kg×${esc(t.reps||"—")}</b> <span class="${cls}">${arrow}</span></div></div>`);
  });
  if(!rows.length) return "";
  let tot="";
  if(prev){ const v0=volumeOf(prev), v1=volumeOf(rec);
    if(v0>0){ const dl=Math.round((v1-v0)/v0*100); tot=`<div class="cmp-row"><div class="cn"><b>Volume total</b></div><div class="cv">${v0.toLocaleString("pt-BR")} → <b>${v1.toLocaleString("pt-BR")}</b> kg <span class="${dl>0?"up":(dl<0?"dn":"eq")}">${dl>0?"+":""}${dl}%</span></div></div>`; } }
  const head=prev?`vs ${PROGRAM[rec.session].name} de ${prettyDate(prev.date)}`:"primeiro registro desta sessão";
  return `<div class="cmpbox"><div class="ct">Comparativo · ${head}</div>${rows.join("")}${tot}</div>`;
}

async function shareFile(md,fn,mime){
  mime=mime||"text/markdown";
  const file=new File([md],fn,{type:mime});
  // 1) compartilhar o arquivo (caminho ideal no iOS 16.4+ → "Salvar em Arquivos")
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:fn}); return; }
    catch(e){ if(e&&e.name==="AbortError") return; }
  }
  // 2) compartilhar como texto (Web Share suportado no iOS desde 12)
  if(navigator.share){
    try{ await navigator.share({title:fn,text:md}); return; }
    catch(e){ if(e&&e.name==="AbortError") return; }
  }
  // 3) em PWA standalone o <a download> falha no WebKit → orienta a copiar
  const standalone=(navigator.standalone===true)||(window.matchMedia&&matchMedia("(display-mode: standalone)").matches);
  if(standalone){ const hn=document.querySelector("#sheet .help-note"); if(hn) hn.innerHTML='<b style="color:var(--vermelho)">Não consegui abrir o compartilhamento.</b> Use o botão "Copiar texto" e cole o treino no Drive ou na conversa do Cowork.'; else appConfirm("Não consegui abrir a folha de compartilhar. Tente de novo.",function(){},openSettings); return; } // alert() não aparece no PWA do iOS; fora do sheet de export (ex.: backup em Ajustes) avisa via appConfirm
  // 4) navegador normal: download direto
  const blob=new Blob([md],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=fn; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
}

function renderProgress(v){
  // séries de trabalho concluídas por grupo muscular (últimos 30 dias)
  const cutoff=(function(){ const d=new Date(); d.setDate(d.getDate()-30); return todayStr(d); })();
  const groups={};
  history.forEach(h=>{ if(h.date<cutoff) return; Object.entries(h.ex||{}).forEach(([id,e])=>{ const g=(EXMETA[id]||{}).g||"outro"; let done=0; if(Array.isArray(e.sets)) done=e.sets.filter(s=>!s.w&&s.done).length; else if(e.done) done=1; if(done) groups[g]=(groups[g]||0)+done; }); });
  const ge=Object.entries(groups).sort((a,b)=>b[1]-a[1]); const gMax=ge.length?ge[0][1]:0;
  const c1=el("div","chart-card");
  c1.innerHTML=`<div class="ct">Séries por grupo muscular</div><div class="cs">de trabalho concluídas · últimos 30 dias</div>`+
    (ge.length? ge.map(([g,n])=>`<div class="mg-row"><div class="mgn">${g}</div><div class="mgbar"><i style="width:${gMax?Math.round(n/gMax*100):0}%"></i></div><div class="mgv">${n}</div></div>`).join("")
      : `<div class="chart-empty">Finalize alguns treinos pra ver o volume por grupo.</div>`);
  v.appendChild(c1);

  // progressão de carga por exercício
  const exIds=[], seen={};
  history.forEach(h=>Object.entries(h.ex||{}).forEach(([id,e])=>{ const hasW=Array.isArray(e.sets)?e.sets.some(s=>!s.w&&s.peso):!!e.carga; if(hasW && !seen[id] && EXMETA[id]){ seen[id]=1; exIds.push(id); } }));
  if(exIds.length){
    const c2=el("div","chart-card");
    c2.innerHTML=`<div class="ct">Progressão de carga</div><div class="cs">maior carga (top set) por sessão · 🟡 = recorde</div>
      <select class="exsel" id="progSel">${exIds.map(id=>`<option value="${id}">${esc(EXMETA[id].n)}</option>`).join("")}</select>
      <div id="progChart"></div>`;
    v.appendChild(c2);
    const drawProg=(id)=>{
      const pts=[]; [...history].sort((a,b)=>a.date<b.date?-1:1).forEach(h=>{ const e=h.ex&&h.ex[id]; if(!e) return; let top=0; if(Array.isArray(e.sets)) e.sets.filter(s=>!s.w).forEach(s=>{ const p=numOf(s.peso); if(p>top) top=p; }); else top=numOf(e.carga); if(top>0) pts.push({date:h.date,top}); });
      const last=pts.slice(-8), max=Math.max(1,...last.map(p=>p.top)); let run=0;
      const box=c2.querySelector("#progChart");
      box.innerHTML = last.length? `<div class="progbars">${last.map(p=>{ const isPR=p.top>run; run=Math.max(run,p.top); const d=p.date.split("-"); return `<div class="pb-col"><div class="pb-v">${p.top}</div><div class="pb-bar${isPR?" pr":""}" style="height:${Math.round(p.top/max*92)}%"></div><div class="pb-d">${d[2]}/${d[1]}</div></div>`; }).join("")}</div>` : `<div class="chart-empty">Sem cargas registradas ainda.</div>`;
    };
    drawProg(exIds[0]);
    c2.querySelector("#progSel").onchange=function(){ drawProg(this.value); };
  }
}

  const gyms=allGyms(); if(h.gym && gyms.indexOf(h.gym)<0) gyms.unshift(h.gym);

    const nm=esc((d&&d.nm)||exNameOf(id));
    if(d&&Array.isArray(d.sets)&&d.sets.length){
      let n=0;
      const rows=d.sets.map((s,si)=>{ const tag=s.w?"W":(s.t==="d"?"D":(s.t==="f"?"F":(++n)));
        return `<div class="he-row" data-ex="${id}" data-si="${si}">
          <span class="he-tag">${tag}</span>

    }

      return `<div class="set-block"><div class="sl">${nm}</div><div class="he-row" data-ex="${id}" data-si="-1">
        <span class="he-tag">1</span>
        <input data-f="carga" inputmode="decimal" value="${qv(d.carga)}" placeholder="kg">
        <input data-f="reps" inputmode="numeric" value="${qv(d.reps)}" placeholder="reps">
        <span></span><span></span>
      </div></div>`;
    }
    return "";
  }).join("");
  sheet.innerHTML=`<div class="grab"></div>
    <h2>Editar treino</h2>
    <div class="sub">${PROGRAM[h.session]?PROGRAM[h.session].name:esc(h.session)} · ${prettyDate(h.date)}. A nota é recalculada ao salvar. O .md já exportado no Drive não muda sozinho — reexporte depois.</div>

      <select class="set-input" id="heGym" style="font-family:var(--body)">
        <option value="" ${!h.gym?"selected":""}>— sem academia —</option>
        ${gyms.map(g=>'<option '+(g===h.gym?"selected":"")+'>'+esc(g)+'</option>').join("")}
        <option value="__new__">+ Outra…</option>
      </select>
      <input class="set-input" id="heGymNew" placeholder="nome da nova academia" style="display:none;margin-top:8px;font-family:var(--body)">
    </div>
    ${exBlocks||'<div class="sub">Este registro não tem exercícios com séries.</div>'}
    <div class="exp-btns"><button class="eb primary" id="heSave">Salvar alterações</button></div>
    <button class="sheet-close" id="heCancel">Cancelar</button>`;
  $("#scrim").classList.add("open");
  const gymSel=sheet.querySelector("#heGym"), gymNew=sheet.querySelector("#heGymNew");
  gymSel.onchange=function(){ const nova=this.value==="__new__"; gymNew.style.display=nova?"block":"none"; if(nova) gymNew.focus(); };
  sheet.querySelectorAll(".he-done").forEach(b=>b.onclick=()=>b.classList.toggle("on"));
  sheet.querySelector("#heCancel").onclick=closeSheet;
  sheet.querySelector("#heSave").onclick=function(){
    let g=gymSel.value;
    if(g==="__new__"){ g=gymNew.value.trim(); if(g && GYMS_BASE.indexOf(g)<0 && settings.gyms.indexOf(g)<0){ settings.gyms.push(g); save(LS_SET,settings); } }
    h.gym=g||"";
    sheet.querySelectorAll(".he-row").forEach(row=>{
      const id=row.dataset.ex, si=+row.dataset.si, d=h.ex[id]; if(!d) return;
      const val=f=>{ const el=row.querySelector('[data-f="'+f+'"]'); return el?el.value.trim():null; };
      if(si<0){ d.carga=val("carga")||""; d.reps=val("reps")||""; return; } // formato antigo
      const s=Array.isArray(d.sets)?d.sets[si]:null; if(!s) return;
      s.peso=val("peso")||""; s.reps=val("reps")||"";
      let esf=val("esf")||""; if(esf!==""){ const v=parseInt(esf,10); esf=(isNaN(v)||v<0)?"":String(Math.min(10,v)); } s.esf=esf;
      const don=row.querySelector(".he-done"); if(don) s.done=don.classList.contains("on");
    });
    if(h.z2only||workSetsOf(h).total>0) h.score=scoreWorkout(h); // nota acompanha a correção
    save(LS_HIST,history);
    closeSheet(); renderHist();
  };
}

function movePlanEx(k,id,dir){
  const ids=sessIds(k); const i=ids.indexOf(id), j=i+dir;
  if(i<0||j<0||j>=ids.length) return;
  ids[i]=ids[j]; ids[j]=id;
  plan.order[k]=ids; savePlan(); renderProg();
}
function usedElsewhere(id,notK){
  return ORDER.some(k=>k!==notK && sessIds(k).indexOf(id)>=0);
}
function resetSessionPlan(k){
  appConfirm("Restaurar a sessão "+PROGRAM[k].name+" pro padrão do programa? Suas edições dela serão apagadas.",function(){
    sessIds(k).forEach(id=>{ if(!EXBASE[id] && plan.custom[id] && !usedElsewhere(id,k) && !history.some(h=>h.ex&&h.ex[id]) && !(draft&&draft.ex&&draft.ex[id])) delete plan.custom[id]; });
    PROGRAM[k].ex.forEach(e=>delete plan.ov[e.id]);
    delete plan.order[k];
    savePlan(); renderProg(); if(currentTab==="hoje") renderHoje();
  });
}
function openExEditor(sessKey,id){

  sheet.innerHTML=`<div class="grab"></div>
    <h2>${id?"Ajustar exercício":"Novo exercício"}</h2>

    <div class="set-block" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

    </div>

    <div class="set-block"><div class="sl">Alternativas (uma por linha)</div><div class="sd">No treino, troque entre elas com um toque em "Como fazer".</div><textarea class="set-input" id="pe-alts" rows="3" style="font-family:var(--body);resize:vertical">${esc((cur.alts||[]).join("\n"))}</textarea></div>
    <div class="set-block"><div class="sl">Como fazer (técnica)</div><textarea class="set-input" id="pe-c" rows="3" style="font-family:var(--body);resize:vertical">${esc(cur.c||"")}</textarea></div>
    <div class="exp-btns">
      <button class="eb primary" id="pe-save">Salvar</button>
      ${(id&&base&&plan.ov[id])?'<button class="eb ghost" id="pe-restore">Restaurar padrão</button>':""}
      ${id?'<button class="eb ghost" id="pe-del" style="color:var(--vermelho)">Remover do treino</button>':""}
    </div>
    <button class="sheet-close" id="pe-close">Cancelar</button>`;
  $("#scrim").classList.add("open");
  const gv=x=>sheet.querySelector("#"+x).value.trim();
  const done=()=>{ savePlan(); closeSheet(); renderProg(); if(currentTab==="hoje") renderHoje(); };
  sheet.querySelector("#pe-save").onclick=()=>{
    const val={ n:gv("pe-n"), sets:Math.max(1,Math.min(10,parseInt(gv("pe-sets"),10)||3)), rr:gv("pe-rr")||"10–12", rir:gv("pe-rir")||"2", rest:gv("pe-rest")||"75s", g:gv("pe-g")||"outro", c:gv("pe-c"), alts:gv("pe-alts").split("\n").map(x=>x.trim()).filter(Boolean) };
    if(!val.n){ const ni=sheet.querySelector("#pe-n"); ni.style.borderColor="var(--vermelho)"; ni.placeholder="dê um nome pro exercício"; ni.focus(); return; } // alert() não aparece no PWA do iOS
    // se o nº de séries mudou e as linhas de hoje ainda estão intocadas, zera pra reconstruir com o alvo novo
    if(id && draft && draft.ex && draft.ex[id]){ const dd=draft.ex[id]; if(Array.isArray(dd.sets) && dd.sets.every(s=>!s.peso&&!s.esf&&!s.done&&(!s.reps||s.pre))){ dd.sets=[]; persist(); } } // reps pré-preenchidas (s.pre) não contam como toque
    if(!id){
      const nid="cx"+Date.now().toString(36);
      plan.custom[nid]=val;
      const ids=sessIds(sessKey); ids.push(nid); plan.order[sessKey]=ids;
    } else if(!base){
      plan.custom[id]=Object.assign({},plan.custom[id],val);
    } else {
      const ov={};
      ["n","sets","rr","rir","rest","g","c"].forEach(f=>{ if(String(val[f])!==String(base[f]==null?"":base[f])) ov[f]=val[f]; });
      if(JSON.stringify(val.alts)!==JSON.stringify(baseAlts(base))) ov.alts=val.alts;
      if(Object.keys(ov).length) plan.ov[id]=ov; else delete plan.ov[id];
    }
    done();
  };
  const rst=sheet.querySelector("#pe-restore"); if(rst) rst.onclick=()=>{ delete plan.ov[id]; done(); };
  const del=sheet.querySelector("#pe-del"); if(del) del.onclick=()=>{
    appConfirm('Remover "'+cur.n+'" desta sessão? (o histórico dele fica guardado)',function(){
      plan.order[sessKey]=sessIds(sessKey).filter(x=>x!==id);
      // custom só é apagado de vez se NÃO houver histórico nem registro de hoje — senão perde nome/grupo nos gráficos
      if(!EXBASE[id] && !usedElsewhere(id,null) && !history.some(h=>h.ex&&h.ex[id]) && !(draft&&draft.ex&&draft.ex[id])) delete plan.custom[id];
      done();
    },function(){ openExEditor(sessKey,id); });
  };
  sheet.querySelector("#pe-close").onclick=closeSheet;
}

/* ---------- helpers de texto ---------- */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function mdLite(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"<code>$1</code>"); }
function fmtSess(rec){
  const s=PROGRAM[rec.session]; if(!s) return rec.date;
  const ar={v:"verde",a:"amarelo",r:"vermelho"}[rec.autoreg]||"—";
  let line=`${rec.date} ${s.name} (${ar})`;
  if(rec.peso) line+=`, peso ${rec.peso}kg`;
  if(rec.sonoH) line+=`, sono ${rec.sonoH}h`;
  if(rec.z2only) return line+" — só caminhada Zona 2";
  const exs=Object.entries(rec.ex||{}).map(([id,d])=>{
    const m=mergedEx(id); const nm=(d&&d.nm)||(m&&m.n)||id;
    if(d && Array.isArray(d.sets)){
      const work=d.sets.filter(x=>!x.w && (x.done||x.esf||x.peso||(x.reps&&!x.pre))); if(!work.length) return null; // reps pré-preenchida não é registro
      const reps=work.map(x=>x.reps||"-").join("/");
      const pesos=[...new Set(work.map(x=>x.peso).filter(Boolean))];
      const peso=pesos.length?(pesos.length===1?pesos[0]+"kg":pesos.join("/")+"kg"):"";
      const esf=work.map(x=>x.esf).filter(Boolean);
      return `${nm}: ${peso} ${reps}${esf.length?` (esf ${esf.join("/")})`:""}`.replace(/\s+/g," ").trim();
    } else if(d && (d.carga||d.reps)){ return `${nm}: ${d.carga?d.carga+"kg ":""}${d.reps||""}`.trim(); }
    return null;
  }).filter(Boolean);
  if(exs.length) line+=` :: ${exs.join("; ")}`;
  return line;
}

/* ---------- coach edita o plano (com aprovação do usuário) ---------- */
const PLANO_RX=/<<<PLANO\s*([\s\S]*?)\s*PLANO>>>/g;
function parsePlanOps(txt){
  const ms=[...String(txt||"").matchAll(PLANO_RX)];
  if(!ms.length) return null;
  let ops=[];
  ms.forEach(m=>{ try{ const a=JSON.parse(m[1]); if(Array.isArray(a)) ops=ops.concat(a); }catch(e){} });
  ops=ops.filter(o=>{
    if(!o) return false;
    if(o.op==="move"||o.op==="remove") return !!(o.session&&o.id);
    if(o.op==="edit") return !!(o.id&&o.fields&&typeof o.fields==="object");
    if(o.op==="add") return !!(o.session&&o.ex&&String(o.ex.n||"").trim());
    return false;
  });
  return ops.length?ops:null;
}
/* sanitiza campos vindos do modelo: whitelist + coerção de tipo (alts string quebraria o render) */
function sanitizeExFields(src){
  const f={};
  ["n","rr","rir","rest","g","c","t"].forEach(k=>{ if(src[k]!==undefined&&src[k]!==null) f[k]=String(src[k]); });
  if(src.sets!==undefined) f.sets=Math.max(1,Math.min(10,parseInt(src.sets,10)||3));
  if(src.alts!==undefined) f.alts=Array.isArray(src.alts)?src.alts.map(String).filter(Boolean):(src.alts?[String(src.alts)]:[]);
  return f;
}
function exNameOf(id){ const m=mergedEx(id); return (m&&m.n)||(EXMETA[id]&&EXMETA[id].n)||id; }
function describeOp(o){
  const sess=(o.session&&PROGRAM[o.session])?PROGRAM[o.session].name:(o.session||"");
  if(o.op==="move") return `Mover "${exNameOf(o.id)}" para ${o.to==null?"o final":"a posição "+((+o.to)+1)} no ${sess}`;
  if(o.op==="edit"){ const f=o.fields||{}; const lbl={n:"nome",sets:"séries",rr:"reps",rir:"RIR",rest:"descanso",g:"grupo",c:"execução",alts:"alternativas"};
    const parts=Object.keys(f).map(k=>(lbl[k]||k)+" → "+(Array.isArray(f[k])?f[k].join(" / "):f[k]));
    return `Ajustar "${exNameOf(o.id)}": ${parts.join(", ")}`; }
  if(o.op==="add") return `Adicionar "${(o.ex&&o.ex.n)||"exercício"}" no ${sess}`;
  if(o.op==="remove") return `Remover "${exNameOf(o.id)}" do ${sess}`;
  return JSON.stringify(o);
}
function applyPlanOps(ops){
  const skipped=[]; let ok=0;
  ops.forEach(o=>{
    if(o.op==="move" && o.session && PROGRAM[o.session] && o.id && sessIds(o.session).indexOf(o.id)>=0){
      const ids=sessIds(o.session), i=ids.indexOf(o.id);
      ids.splice(i,1); const to=Math.max(0,Math.min(ids.length,(o.to==null)?ids.length:+o.to));
      ids.splice(to,0,o.id); plan.order[o.session]=ids; ok++;
    } else if(o.op==="edit" && o.id && o.fields && (EXBASE[o.id]||plan.custom[o.id])){
      const f=sanitizeExFields(o.fields);
      if(f.n!==undefined && !f.n.trim()) delete f.n;
      if(!Object.keys(f).length){ skipped.push(o); return; }
      if(EXBASE[o.id]) plan.ov[o.id]=Object.assign({},plan.ov[o.id],f);
      else plan.custom[o.id]=Object.assign({},plan.custom[o.id],f);
      // se as séries de hoje ainda estão intocadas, reconstrói com o alvo novo (reps pré-preenchidas não contam como toque)
      if(draft&&draft.ex&&draft.ex[o.id]){ const dd=draft.ex[o.id]; if(Array.isArray(dd.sets)&&dd.sets.every(s=>!s.peso&&!s.esf&&!s.done&&(!s.reps||s.pre))) dd.sets=[]; }
      ok++;
    } else if(o.op==="add" && o.session && PROGRAM[o.session] && o.ex && String(o.ex.n||"").trim()){
      const nid="cx"+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36);
      plan.custom[nid]=Object.assign({sets:3,rr:"10–12",rir:"2",rest:"75s",g:"outro",c:"",t:"",alts:[]},sanitizeExFields(o.ex));
      const ids=sessIds(o.session), to=Math.max(0,Math.min(ids.length,(o.to==null)?ids.length:+o.to));
      ids.splice(to,0,nid); plan.order[o.session]=ids; ok++;
    } else if(o.op==="remove" && o.session && PROGRAM[o.session] && o.id && sessIds(o.session).indexOf(o.id)>=0){
      plan.order[o.session]=sessIds(o.session).filter(x=>x!==o.id); ok++;
    } else skipped.push(o);
  });
  if(ok){ savePlan(); if(draft) persist(); if(currentTab==="hoje") renderHoje(); }
  return {ok:ok, skipped:skipped};
}

async function askClaude(){
  const key=(settings.apiKey||"").trim();
  const apiMsgs=coachMessages.filter(m=>!m.local&&(m.role==="user"||m.role==="assistant")).map(m=>{
    let c=m.content;
    // blocos de plano já resolvidos não voltam pro modelo (evita re-emitir/duplicar ops já aplicadas)
    if(m.role==="assistant"&&m.applied) c=c.replace(/<<<PLANO[\s\S]*?PLANO>>>/g,"[mudança de plano já "+(m.applied===true?"aplicada":"ignorada")+" pelo usuário — não repita]");
    return {role:m.role,content:c};
  });
  while(apiMsgs.length && apiMsgs[0].role!=="user") apiMsgs.shift(); // API exige 1ª msg = user
  if(!apiMsgs.length){
    coachMessages.push({role:"assistant",content:"⚠️ Não consegui reconstruir a conversa. Toque numa pergunta sugerida acima pra recomeçar.",error:true,local:true});
    coachBusy=false; saveCoach(); renderCoach(); return;
  }
  let bubble;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{
      "content-type":"application/json","x-api-key":key,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"
    },body:JSON.stringify({model:settings.model||"claude-opus-4-8",max_tokens:2000,system:buildCoachSystem(),messages:apiMsgs})});
    if(!res.ok){
      let msg="Erro "+res.status+".";
      if(res.status===401) msg="Chave de API inválida ou sem crédito. Confira em ⚙ Ajustes.";
      else if(res.status===429) msg="Limite de uso atingido — tente daqui a pouco.";
      else { try{const e=await res.json(); if(e&&e.error&&e.error.message) msg=e.error.message;}catch(_){} }
      bubble={role:"assistant",content:"⚠️ "+msg,error:true,local:true};
    }else{
      const data=await res.json();
      if(data.stop_reason==="refusal"){ bubble={role:"assistant",content:"Não consigo responder isso. Reformule focando em treino, execução, progressão ou nutrição.",local:true}; }
      else{ let txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()||"(sem resposta)"; if(data.stop_reason==="max_tokens") txt+="\n\n_(resposta cortada no limite — peça \"continuar\" pelo resto)_"; bubble={role:"assistant",content:txt}; }
    }
  }catch(e){
    bubble={role:"assistant",content:"⚠️ Não consegui conectar. O Coach precisa de internet — confira sua conexão. (O resto do app funciona offline.)",error:true,local:true};
  }
  coachMessages.push(bubble); coachBusy=false; saveCoach(); renderCoach();
}

let foodCache = load(LS_FOOD, []); if(!Array.isArray(foodCache)) foodCache=[];
function saveFoods(){ save(LS_FOOD, foodCache.slice(0,60)); }
const foodKey=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\s+/g," ").trim();
function rememberFood(it){ // guarda no cache de recentes (dedup por nome+quantidade), mais recente primeiro
  const k=foodKey(it.nome+"|"+(it.q||""));
  foodCache=foodCache.filter(f=>foodKey(f.nome+"|"+(f.q||""))!==k);

  saveFoods();
}
function normItem(o){ // sanitiza um item vindo da IA/API
  if(!o||typeof o!=="object") return null; // null/primitivo no meio do array não derruba o lote
  const n=v=>{ const x=parseFloat(String(v==null?"":v).replace(",",".")); return isNaN(x)?0:Math.max(0,Math.round(x*10)/10); };
  const nome=String(o.nome||o.name||"").trim().slice(0,80); if(!nome) return null;
  return {nome:nome, q:String(o.q||o.quantidade||o.porcao||"").trim().slice(0,40), kcal:Math.round(n(o.kcal||o.calorias||o.energia)), prot:n(o.prot||o.proteina||o.protein), carb:n(o.carb||o.carboidrato||o.carbs), gord:n(o.gord||o.gordura||o.fat||o.lipideos), fib:n(o.fib||o.fibra||o.fiber)};
}
/* usa o Claude (via a chave do próprio app) pra estimar macros de uma descrição em português */
async function parseFoodText(text){
  const key=(settings.apiKey||"").trim();
  if(!key) throw {noKey:true};
  if(settings.offline) throw {msg:"Modo offline ativado — desligue em ⚙ Ajustes pra calcular macros."};
  if(!(await cloudGateP())) throw {msg:"Envio cancelado."};
  const sys=`Você é um calculador de macros nutricionais brasileiro. Recebe uma descrição de comida em português (com quantidades caseiras: "colher", "concha", "fatia", "prato", "unidade", gramas, ml) e devolve os macros ESTIMADOS de cada alimento separadamente, usando valores da culinária brasileira (TACO/TBCA). Responda SOMENTE com um array JSON válido, sem texto antes ou depois, no formato:
[{"nome":"Patinho grelhado","q":"180 g","kcal":320,"prot":56,"carb":0,"gord":10,"fib":0}]
Regras: "kcal" inteiro; "prot"/"carb"/"gord"/"fib" em gramas (número, pode ter 1 casa decimal); "q" = a quantidade que você assumiu. Um objeto por alimento distinto. Se a quantidade não for dada, assuma uma porção caseira típica e diga qual em "q". Nunca invente alimentos que não estão na descrição.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{
    "content-type":"application/json","x-api-key":key,
    "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"
  },body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:1200,system:sys,
    messages:[{role:"user",content:text},{role:"assistant",content:"["}]})}); // prefill "[" força JSON
  if(!res.ok){ if(res.status===401) throw {msg:"Chave de API inválida ou sem crédito (confira em ⚙ Ajustes)."}; if(res.status===429) throw {msg:"Limite de uso — tente daqui a pouco."}; throw {msg:"Erro "+res.status+" ao calcular."}; }
  const data=await res.json();
  let txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  txt="["+txt; const a=txt.indexOf("["), b=txt.lastIndexOf("]"); if(a<0||b<0) throw {msg:"Não consegui ler os macros. Tente descrever de outro jeito."};
  let arr; try{ arr=JSON.parse(txt.slice(a,b+1)); }catch(e){ throw {msg:"Não consegui ler os macros. Tente descrever de outro jeito."}; }
  const items=(Array.isArray(arr)?arr:[arr]).map(normItem).filter(Boolean);
  if(!items.length) throw {msg:"Nenhum alimento reconhecido."};
  return items;
}
/* código de barras via Open Food Facts (aberto, sem conta; macros por 100 g) */
async function lookupBarcode(code){
  if(settings.offline) throw {msg:"Modo offline ativado — desligue em ⚙ Ajustes pra buscar o código."};
  code=String(code||"").replace(/\D/g,""); if(code.length<6) throw {msg:"Código de barras inválido."};
  let data;
  try{ const res=await fetch("https://world.openfoodfacts.org/api/v2/product/"+code+".json?fields=product_name,brands,nutriments");
    if(!res.ok) throw 0; data=await res.json();
  }catch(e){ throw {msg:"Sem internet ou produto não encontrado."}; }
  if(!data||data.status!==1||!data.product) throw {msg:"Produto não encontrado no Open Food Facts."};
  const p=data.product, nu=p.nutriments||{};
  const base=String(p.product_name||"").trim()||"Produto", brand=p.brands?String(p.brands).split(",")[0].trim():"";
  const nome=(brand && base.toLowerCase().indexOf(brand.toLowerCase())<0)?base+" ("+brand+")":base; // não duplica a marca já contida no nome
  const g=k=>{ const x=nu[k]; return (x==null||isNaN(x))?0:Math.max(0,Math.round(+x*10)/10); };
  const item=normItem({nome:nome.slice(0,80), q:"100 g", kcal:g("energy-kcal_100g")||Math.round(g("energy_100g")/4.184), prot:g("proteins_100g"), carb:g("carbohydrates_100g"), gord:g("fat_100g"), fib:g("fiber_100g")});
  if(!item) throw {msg:"Produto sem nome no Open Food Facts."};
  if(!item.kcal&&!item.prot&&!item.carb&&!item.gord) throw {msg:"Produto encontrado, mas sem dados nutricionais no Open Food Facts."};
  return item;
}
function loggedTotals(){ const t={kcal:0,prot:0,carb:0,gord:0,fib:0}; (draft.meals.logged||[]).forEach(it=>{ if(!it||typeof it!=="object") return; t.kcal+=+it.kcal||0; t.prot+=+it.prot||0; t.carb+=+it.carb||0; t.gord+=+it.gord||0; t.fib+=+it.fib||0; }); Object.keys(t).forEach(k=>t[k]=Math.round(t[k]*10)/10); return t; }
function addLoggedItems(items){
  ensureDraft(); ensureMeals(); // virada do dia: arquiva ontem e registra no dia certo
  items=(items||[]).filter(it=>it&&typeof it==="object"&&it.nome);
  if(!items.length) return;
  items.forEach(it=>{ draft.meals.logged.push(it); rememberFood(it); });
  persist(); renderNutri();
}

/* estado do registro rápido que sobrevive a re-renders (marcar creatina/plano não pode apagar o que está digitado) */
let qlogText="", qlogBar="", qlogBusy=false, qlogSeq=0, qlogErrMsg="";
function renderQuickLog(){
  const card=el("div","card qlog");
  const hasKey=!!(settings.apiKey||"").trim();
  const logged=draft.meals.logged||[];
  card.innerHTML=`<div class="section-label">Registro rápido</div>
    <textarea id="qlogText" placeholder="o que você comeu? ex.: 180g de patinho, 4 colheres de arroz, 1 concha de feijão"></textarea>
    <button class="qlog-btn" id="qlogCalc"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg>Calcular macros com IA</button>
    <div class="qlog-bar"><input id="qlogBar" inputmode="numeric" placeholder="código de barras (digite/cole)"><button id="qlogBarBtn">Buscar</button></div>
    <div class="qlog-err ${qlogErrMsg?"":"hidden"}" id="qlogErr">${esc(qlogErrMsg)}</div>
    ${!hasKey?`<div class="qlog-err" style="color:var(--mute)">Sem chave de API — configure em ⚙ pra calcular por texto. O código de barras e os recentes funcionam sem chave.</div>`:""}
    ${foodCache.length?`<div class="qlog-recent">${foodCache.slice(0,20).map((f,i)=>`<button class="qchip" data-fav="${i}">${esc(f.nome)}${f.q?" · "+esc(f.q):""} <b>${fmtNum(f.prot)}g</b></button>`).join("")}</div>`:""}
    ${logged.length?`<div id="qlogList"></div>`:`<div class="foot" style="padding:14px 4px 2px">Nada registrado hoje. Descreva o que comeu que a IA calcula proteína, carbo, gordura e calorias — e guarda pra virar atalho.</div>`}`;

  const calcBtn=card.querySelector("#qlogCalc"), ta=card.querySelector("#qlogText");
  const barBtn=card.querySelector("#qlogBarBtn"), barIn=card.querySelector("#qlogBar");
  // reidrata o que estava digitado e o estado "calculando" (requisição em voo)
  ta.value=qlogText; barIn.value=qlogBar;
  if(qlogBusy){ calcBtn.disabled=true; calcBtn.textContent="Calculando…"; barBtn.disabled=true; }
  ta.addEventListener("input",()=>{ qlogText=ta.value; ta.style.height="auto"; ta.style.height=Math.min(140,ta.scrollHeight)+"px"; });
  barIn.addEventListener("input",()=>{ qlogBar=barIn.value; });
  calcBtn.onclick=async()=>{
    const t=ta.value.trim(); if(!t||qlogBusy) return;
    const my=++qlogSeq; qlogBusy=true; qlogErrMsg="";
    calcBtn.disabled=true; calcBtn.textContent="Calculando…"; barBtn.disabled=true;
    try{
      const items=await parseFoodText(t);
      if(my!==qlogSeq) return; // resposta velha: outro pedido assumiu — não duplica
      qlogBusy=false; qlogText="";
      addLoggedItems(items);
    }catch(e){
      if(my!==qlogSeq) return;
      qlogBusy=false;
      if(e&&e.noKey){ renderNutri(); openSettings(); return; }
      qlogErrMsg=(e&&e.msg)||"Não consegui calcular agora.";
      renderNutri(); // o erro sobrevive mesmo se o card foi re-renderizado no meio
    }
  };
  barBtn.onclick=async()=>{
    const c=barIn.value.trim(); if(!c||qlogBusy) return;
    const my=++qlogSeq; qlogBusy=true; qlogErrMsg="";
    barBtn.disabled=true; barBtn.textContent="…"; calcBtn.disabled=true;
    try{
      const it=await lookupBarcode(c);
      if(my!==qlogSeq) return;
      qlogBusy=false; qlogBar="";
      addLoggedItems([it]);
    }catch(e){
      if(my!==qlogSeq) return;
      qlogBusy=false;
      qlogErrMsg=(e&&e.msg)||"Não encontrei esse código.";
      renderNutri();
    }
  };
  card.querySelectorAll("[data-fav]").forEach(b=>b.onclick=()=>{ const f=foodCache[+b.dataset.fav]; if(f) addLoggedItems([Object.assign({},f)]); });

  if(logged.length){
    const list=card.querySelector("#qlogList");
    list.innerHTML=logged.map((it,i)=>`<div class="logitem"><div class="li-b"><div class="li-n">${esc(it.nome)}</div><div class="li-m">${it.q?esc(it.q)+" · ":""}${it.kcal} kcal · C ${fmtNum(it.carb)} G ${fmtNum(it.gord)} F ${fmtNum(it.fib)}</div></div><div class="li-p">${fmtNum(it.prot)}g</div><button class="li-del" data-del="${i}" aria-label="remover">×</button></div>`).join("");
    const t=loggedTotals();
    const totEl=el("div","logtot"); totEl.innerHTML=`<span>Total registrado</span><span><b>${fmtNum(t.prot)}g</b> prot · <b>${t.kcal}</b> kcal</span>`;
    list.appendChild(totEl);
    list.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ draft.meals.logged.splice(+b.dataset.del,1); persist(); renderNutri(); });
  }
  return card;
}

function renderNutri(){
  ensureDraft(); ensureMeals();
  const v=$("#view-nutri"); v.innerHTML="";
  const ml=draft.meals;

  // ----- métrica-herói: proteína do dia -----
  const tot=loggedTotals();
  const goal=+settings.protGoal||170;
  const ppct=Math.min(100,Math.round(tot.prot/goal*100));
  const hero=el("div","prot-hero");
  hero.innerHTML=`<div class="ph-top"><div><div class="ph-lbl">Proteína hoje</div><div class="ph-big">${fmtNum(tot.prot)}<small> / ${goal} g</small></div></div><div class="ph-lbl">${ppct}%</div></div>
    <div class="prot-bar"><i style="width:${ppct}%"></i></div>
    <div class="prot-macros"><span>Carbo <b>${fmtNum(tot.carb)}g</b></span><span>Gordura <b>${fmtNum(tot.gord)}g</b></span><span>Fibra <b>${fmtNum(tot.fib)}g</b></span><span>≈<b>${tot.kcal}</b> kcal</span></div>`;

  // ----- registro rápido (texto livre → IA + código de barras) -----
  v.appendChild(renderQuickLog());

  let plan=0,cons=0;

  const kc=el("div","kcal-card");
  kc.innerHTML=`<div class="kcal-top"><div><div class="lbl">Consumido hoje</div><div class="big">${cons}<small> / ≈${plan} kcal</small></div></div><div class="lbl">${pct}%</div></div><div class="kcal-bar"><i style="width:${pct}%"></i></div>`;
  v.appendChild(kc);

  const q=el("div","nutri-quick");
  q.innerHTML=`<div class="field"><label>Água (L)</label><div class="inline-input"><input type="text" inputmode="decimal" id="aguaL" value="${(ml.aguaL||"").replace(/"/g,"&quot;")}" placeholder="3"></div></div>
    <div class="field" style="display:flex;align-items:center;justify-content:space-between;gap:8px;"><label style="margin:0">Creatina 5 g</label><div class="toggle ${ml.creatina?"on":""}" id="creaTog"></div></div>`;
  v.appendChild(q);
  q.querySelector("#aguaL").addEventListener("input",function(){ ml.aguaL=this.value; persist(); });
  q.querySelector("#creaTog").onclick=function(){ ml.creatina=!ml.creatina; this.classList.toggle("on"); persist(); renderNutri(); };

  MEAL_PLAN.forEach((meal,mi)=>{
    const card=el("div","meal");
    let sub=0; meal.foods.forEach((f,fi)=>{ if(ml.check[mi+"-"+fi]) sub+=f.k; });
    const subTotal=meal.foods.reduce((a,f)=>a+f.k,0);
    card.innerHTML=`<div class="meal-h"><div class="mn">${meal.nome}</div><div class="mk">${sub}/${subTotal} kcal</div></div>`+
      meal.foods.map((f,fi)=>{ const key=mi+"-"+fi, on=!!ml.check[key], adj=ml.qadj[key]||"";
        return `<div class="food${on?" on":""}" data-key="${key}">
          <button class="fchk${on?" on":""}" data-fa="chk" aria-label="marcar"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <div class="fb"><div class="fn">${f.n}</div><div class="fq">${adj?adj+" · ":""}${f.q}</div></div>
          <div class="fk">${f.k} kcal</div>
          <button class="fedit" data-fa="edit" aria-label="ajustar quantidade"><svg viewBox="0 0 24 24" fill="none"><path d="M4 20h4L18 10l-4-4L4 16v4ZM14 6l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
        <div class="qadj" data-qadj="${key}" style="display:${adj?"block":"none"}"><input type="text" placeholder="quantidade ajustada (ex.: metade, 120 g)" value="${adj.replace(/"/g,"&quot;")}"></div>`;
      }).join("");
    v.appendChild(card);
    card.querySelectorAll(".food").forEach(row=>{
      const key=row.dataset.key;
      row.querySelector('[data-fa="chk"]').onclick=()=>{ ml.check[key]=!ml.check[key]; persist(); renderNutri(); };
      row.querySelector('[data-fa="edit"]').onclick=()=>{ const box=card.querySelector('[data-qadj="'+key+'"]'); const open=box.style.display==="none"; box.style.display=open?"block":"none"; if(open) box.querySelector("input").focus(); };
    });
    card.querySelectorAll("[data-qadj]").forEach(box=>{ const key=box.dataset.qadj; box.querySelector("input").addEventListener("input",function(){ ml.qadj[key]=this.value; persist(); }); });
  });

  const ex=el("div","card");
  ex.innerHTML=`<div class="section-label">Comi a mais (fora do plano)</div>
    <textarea id="mealExtras" placeholder="ex.: 1 pão de queijo, 1 refri…" style="width:100%;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px;padding:11px;color:var(--text);font-size:14px;resize:none;min-height:56px;outline:none;font-family:var(--body);">${esc(ml.extras||"")}</textarea>`;
  v.appendChild(ex);
  ex.querySelector("#mealExtras").addEventListener("input",function(){ ml.extras=this.value; persist(); });

  const foot=el("div","foot");
  foot.innerHTML=`Marque o que comeu, toque no lápis pra ajustar a quantidade. Tudo entra no arquivo exportado e vira contexto pro Coach.`;
  v.appendChild(foot);
}

          if(k===LS_SET&&v&&typeof v==="object"){ v=Object.assign({},v); delete v.apiKey; const cur=load(LS_SET,null); if(cur&&cur.apiKey) v.apiKey=cur.apiKey; } // chave nunca entra por arquivo; a do aparelho é preservada
          const s=JSON.stringify(v); try{ localStorage.setItem(k,s); }catch(e){} natSet(k,s); }
          else if(k!==LS_SET){ try{ localStorage.removeItem(k); }catch(e){} natRemove(k); } // "substituir" de verdade: key ausente no backup some do aparelho (menos Ajustes, pra não perder a chave)
        });
        location.reload(); // re-inicializa todo o estado a partir do que foi importado
      },openSettings);
    };
    rd.readAsText(f);
  };
  sheet.querySelector("#wipe").onclick=function(){
    appConfirm("Apagar todos os treinos registrados, o rascunho de hoje, o histórico do Coach e as personalizações do plano? Não dá pra desfazer.",function(){
      history=[]; draft=null; coachMessages=[]; plan={ov:{},order:{},custom:{}}; save(LS_HIST,history); localStorage.removeItem(LS_DRAFT); natRemove(LS_DRAFT); localStorage.removeItem(LS_PLAN); natRemove(LS_PLAN); refreshEXMETA(); saveCoach();
      updateWeekLabel(); setTab(currentTab);
    },openSettings);
  };
  sheet.querySelector("#setClose").onclick=function(){ closeSheet(); if(currentTab==="coach") renderCoach(); };
}

/* ============================================================
   ROTEAMENTO + ÍCONE
   ============================================================ */
let currentTab="hoje";
function setTab(t){
  currentTab=t;
  document.body.classList.toggle("coachlock", t==="coach"); // Coach: trava a página, só o feed rola
  coachViewportFix(); // fora do Coach, limpa o translateY; no Coach, encaixa no viewport
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.tab===t));
  ["hoje","nutri","coach","hist","prog"].forEach(n=>$("#view-"+n).classList.toggle("hidden",n!==t));
  if(t==="hoje") renderHoje();
  if(t==="nutri") renderNutri();
  if(t==="coach") renderCoach();
  if(t==="hist") renderHist();
  if(t==="prog") renderProg();
  updateFinishBar();
  if(t!=="coach") window.scrollTo(0,0);
}
document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>setTab(x.dataset.tab));
$("#gearBtn").onclick=openSettings;
$("#btnFinish").onclick=finishWorkout;
$("#btnCrono").onclick=cronoToggle;
$("#scrim").onclick=function(e){ if(e.target===this) closeSheet(); };
// fechar qualquer folha: toque no risquinho (grab) ou arrastando o topo dela pra baixo (gesto iOS)
$("#sheet").addEventListener("click",function(e){ if(e.target.classList && e.target.classList.contains("grab")) closeSheet(); });
(function(){
  const sheet=$("#sheet"); let y0=null;
  sheet.addEventListener("touchstart",function(e){
    y0=(sheet.scrollTop<=0 && e.target.closest && e.target.closest(".grab,h2,.sub"))?e.touches[0].clientY:null;
  },{passive:true});
  sheet.addEventListener("touchmove",function(e){ if(y0!=null && e.touches[0].clientY-y0>70){ y0=null; closeSheet(); } },{passive:true});
  sheet.addEventListener("touchend",function(){ y0=null; },{passive:true});
})();

// week label no topo
function updateWeekLabel(){ $("#weekLabel").innerHTML=`Sem ${currentWeek()}/12<br>${currentBlock().n.split(" — ")[0]==="1"?"Fundação":currentBlock().n.split(" — ")[1]}`; }
updateWeekLabel();

// gera ícone apple-touch via canvas (home screen bonito)
(function(){
  try{
    const cv=document.createElement("canvas"); cv.width=180; cv.height=180;
    const x=cv.getContext("2d");
    const g=x.createLinearGradient(0,0,180,180); g.addColorStop(0,"#1A2030"); g.addColorStop(1,"#0D0F14");
    x.fillStyle=g; x.fillRect(0,0,180,180);
    // barra/dumbbell
    x.strokeStyle="#4F8BFF"; x.lineWidth=11; x.lineCap="round";
    const cy=90;
    x.beginPath(); x.moveTo(56,cy); x.lineTo(124,cy); x.stroke(); // barra
    x.lineWidth=13;
    [[44,30],[58,46],[122,138],[136,150]].forEach(p=>{ x.beginPath(); x.moveTo(p[0],cy-26); x.lineTo(p[0],cy+26); x.stroke(); });
    const url=cv.toDataURL("image/png");
    const link=document.createElement("link"); link.rel="apple-touch-icon"; link.href=url; document.head.appendChild(link);
    const fav=document.createElement("link"); fav.rel="icon"; fav.href=url; document.head.appendChild(fav);
  }catch(e){}
})();

// barra de descanso (contagem regressiva) + cronômetro do treino
setInterval(function(){ rcdTick(); cronoTick(); },1000);
// ao voltar do background, retoma o áudio (iOS deixa "interrupted"), atualiza a contagem
// e trata a virada do dia (o PWA volta com o JS de ontem vivo — arquiva e recomeça)
document.addEventListener("visibilitychange",function(){
  if(document.hidden) return;
  try{ const ac=window.__ac; if(ac&&ac.state!=="running") ac.resume(); }catch(e){}
  rcdTick();
  if(draft && draft.date!==todayStr()){
    if(currentTab==="hoje") renderHoje();
    else if(currentTab==="nutri") renderNutri();
    else ensureDraft();
    updateFinishBar();
  }
});

// aba Coach: encaixa a tela na área visível — quando o teclado do iOS abre, o visualViewport encolhe
// e o layout acompanha, em vez de a página ser empurrada pra baixo (abas sempre no enquadro).
// Além do height, compensa o offsetTop: em PWA standalone o iOS às vezes EMPURRA a página inteira
// pra revelar o campo — o translateY traz o app de volta pro enquadro visível.
function coachViewportFix(){
  const app=document.getElementById("app");
  if(currentTab!=="coach"){ if(app) app.style.transform=""; return; }
  const vv=window.visualViewport;
  document.documentElement.style.setProperty("--vvh",(vv?vv.height:window.innerHeight)+"px");
  window.scrollTo(0,0);
  if(app) app.style.transform=(vv&&vv.offsetTop>0)?("translateY("+vv.offsetTop+"px)"):"";
  const feed=document.querySelector(".coach-feed");
  if(feed && feed.scrollHeight-feed.scrollTop-feed.clientHeight<60) feed.scrollTop=feed.scrollHeight; // só re-ancora se já estava no fim (não rouba a posição de leitura)
}
if(window.visualViewport){
  window.visualViewport.addEventListener("resize",coachViewportFix);
  window.visualViewport.addEventListener("scroll",coachViewportFix);
}
// o teclado anima em ~250–500ms e nem sempre dispara resize no standalone — re-aplica após foco/desfoco
document.addEventListener("focusin",function(e){ if(currentTab==="coach"&&e.target&&e.target.id==="coachText"){ setTimeout(coachViewportFix,80); setTimeout(coachViewportFix,350); setTimeout(coachViewportFix,750); } });
document.addEventListener("focusout",function(){ if(currentTab==="coach"){ setTimeout(coachViewportFix,80); setTimeout(coachViewportFix,400); } });
$("#rcdMinus").onclick=()=>rcdAdjust(-15);
$("#rcdPlus").onclick=()=>rcdAdjust(15);
$("#rcdSkip").onclick=rcdSkip;

// boot
setTab("hoje");
