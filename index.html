// SVG de tendência: banda de referência POR PONTO (a ref muda entre labs — degraus, sem fundir ensaios),
// linha, pontos ok/ruins, tique na troca de lab, e marcas verticais de medicação (marks=[{fi,label}]).
function examTrendSVG(serie,dir,w,h,marks){
  const P=serie.filter(function(p){ return p.valor!=null; });
  if(P.length<1) return "";
  const padL=6,padR=6,padT=8,padB=16;
  let min=Infinity,max=-Infinity;
  P.forEach(function(p){
    if(p.valor<min)min=p.valor; if(p.valor>max)max=p.valor;
    if(p.ref_min!=null){ if(p.ref_min<min)min=p.ref_min; if(p.ref_min>max)max=p.ref_min; }
    if(p.ref_max!=null){ if(p.ref_max<min)min=p.ref_max; if(p.ref_max>max)max=p.ref_max; }
  });
  if(!(max>min)) max=min+1;
  const span=max-min; min-=span*0.08; max+=span*0.08;
  const X=function(i){ return P.length<=1?(w/2):(padL+(i/(P.length-1))*(w-padL-padR)); };
  const Y=function(v){ return padT+(1-(v-min)/(max-min))*(h-padT-padB); };
  const r1=function(v){ return Math.round(v*10)/10; };
  let out="";
  for(let i=0;i<P.length;i++){
    const p=P[i];
    if(p.ref_min==null&&p.ref_max==null) continue;
    const x0=(i===0)?X(0):(X(i-1)+X(i))/2, x1=(i===P.length-1)?X(i):(X(i)+X(i+1))/2;
    const top=(p.ref_max!=null)?Y(p.ref_max):padT, bot=(p.ref_min!=null)?Y(p.ref_min):(h-padB);
    out+='<rect class="xb" x="'+r1(x0)+'" y="'+r1(top)+'" width="'+r1(Math.max(0,x1-x0))+'" height="'+r1(Math.max(0,bot-top))+'"/>';
  }
  (marks||[]).forEach(function(m){ if(m.fi==null) return; const x=X(Math.max(0,Math.min(P.length-1,m.fi)));
    out+='<line class="xmed" x1="'+r1(x)+'" y1="'+padT+'" x2="'+r1(x)+'" y2="'+(h-padB)+'"/><text class="xmt" x="'+r1(x+3)+'" y="'+(padT+8)+'">'+m.label+'</text>'; });
  out+='<polyline class="xl" points="'+P.map(function(p,i){ return r1(X(i))+","+r1(Y(p.valor)); }).join(" ")+'"/>';
  for(let i=1;i<P.length;i++){ if((P[i].laboratorio||"")!==(P[i-1].laboratorio||"")){ const xm=(X(i-1)+X(i))/2;
    out+='<line class="xlab" x1="'+r1(xm)+'" y1="'+padT+'" x2="'+r1(xm)+'" y2="'+(h-padB)+'"/>'; } }
  P.forEach(function(p,i){ out+='<circle class="'+(examPointBad(p,dir)?"xp bad":"xp")+'" cx="'+r1(X(i))+'" cy="'+r1(Y(p.valor))+'" r="3.4"/>'; });
  return out;
}
// posição fracionária (em índice da série) de uma data — pros tiques de medicação
function examDateFrac(serie,iso){
  const P=serie.filter(function(p){ return p.valor!=null; });
  if(P.length<2||!iso) return null;
  const t=+new Date(iso), d0=+new Date(P[0].data), d1=+new Date(P[P.length-1].data);
  if(!(t>=d0&&t<=d1)) return null;
  for(let i=0;i<P.length-1;i++){ const a=+new Date(P[i].data), b=+new Date(P[i+1].data);
    if(t>=a&&t<=b) return i+(b>a?(t-a)/(b-a):0); }

// narrativa DESCRITIVA (nunca diagnóstica): estado vs faixa + o movimento desde o exame anterior
function examNarrative(serie,cat){
  const P=serie.filter(function(p){ return p.valor!=null; });
  if(!P.length) return "sem medições";
  const last=P[P.length-1], prev=P.length>1?P[P.length-2]:null;
  const parts=[];
  if(last.fora_faixa===1) parts.push("acima da faixa"+(last.ref_impressa?" ("+last.ref_impressa+")":""));
  else if(last.fora_faixa===-1) parts.push("abaixo da faixa"+(last.ref_impressa?" ("+last.ref_impressa+")":""));
  else if(last.fora_faixa===0) parts.push("dentro da faixa");
  else parts.push("sem faixa impressa no laudo");
  if(prev){
    const d=last.valor-prev.valor;
    if(Math.abs(d)>1e-9) parts.push((d>0?"subiu de ":"caiu de ")+fmtNum(prev.valor)+" ("+examMesAno(prev.data)+") para "+fmtNum(last.valor));
    else parts.push("estável em "+fmtNum(last.valor));
  }
  if(P.length>=3){
    const a=P[P.length-3].valor,b=P[P.length-2].valor,c=P[P.length-1].valor, dir=cat&&cat.dir;
    if(dir==="maior"&&c<b&&b<a) parts.push("em queda nos últimos 3 exames");
    if(dir==="menor"&&c>b&&b>a) parts.push("em alta nos últimos 3 exames");
  }
  return parts.join(" — ");
}

// nota do sono 0–10, TODA em código (nem Sleep++ nem o app do aparelho expõem nota via HealthKit):
// duração (0–5): 7,5h+ = cheio, escala linear a partir de 4h · eficiência (0–2): % acordado
// profundidade (0–2): profundo+REM vs 27% da noite (ou vs baseline se houver) · aparelho usado (0–1)
function hubSleepScore(sono,base){
  if(!sono||sono.horas==null) return null;
  const dur=Math.max(0,Math.min(5,(sono.horas-4)/(7.5-4)*5));
  const total=sono.horas*60;
  const efic=total>0?Math.max(0,Math.min(2,2-((sono.acordado_min||0)/total)*10)):1; // 20% acordado zera
  let prof=1;
  if(sono.estagios){
    const dr=(sono.profundo_min||0)+(sono.rem_min||0);
    const alvo=(base&&base.deepRem)?base.deepRem:total*0.27;
    prof=alvo>0?Math.max(0,Math.min(2,(dr/alvo)*2)):1;
  }
  const dev=(sono.sleepdev===false)?0:1;
  return Math.round((dur+efic+prof+dev)*10)/10;
}

/* ---- Fase 6 (adaptada): leitor do PDF de bioimpedância InBody — camada de texto, sem OCR ---- */
var INBODY_TOK=/\((?:[^()\\]|\\.)*\)|\[|\]|\/[^\s\/<>()\[\]{}]*|-?\d+(?:\.\d+)?|[A-Za-z'"*]+/g;
// content stream (string latin-1) → linhas de texto na ordem visual (rastreia q/Q/cm/Td)
function inbodyLines(content){
  var rows=[];
  var stack=[], sx=1, sy=1, tx=0, ty=0, lx=0, ly=0, st=[];
  var m; INBODY_TOK.lastIndex=0;
  while((m=INBODY_TOK.exec(content))){
    var tok=m[0], c=tok.charAt(0);
    if(c==="("||c==="["||c==="]"||c==="/"||c==="-"||(c>="0"&&c<="9")){ st.push(tok); continue; }
    if(tok==="q") stack.push([sx,sy,tx,ty]);
    else if(tok==="Q"){ var p=stack.pop(); if(p){ sx=p[0]; sy=p[1]; tx=p[2]; ty=p[3]; } }
    else if(tok==="cm"&&st.length>=6){
      var a=+st[st.length-6], d=+st[st.length-3], e=+st[st.length-2], f=+st[st.length-1];
      tx+=e*sx; ty+=f*sy; sx*=a; sy*=d;
    }
    else if(tok==="BT"){ lx=0; ly=0; }
    else if((tok==="Td"||tok==="TD")&&st.length>=2){ lx+=+st[st.length-2]; ly+=+st[st.length-1]; }
    else if(tok==="TJ"||tok==="Tj"){
      var txt="";
      for(var i=0;i<st.length;i++){ var v=st[i]; if(v.charAt(0)==="(") txt+=v.slice(1,-1).replace(/\\(.)/g,"$1"); }
      if(txt.replace(/\s+/g,"")) rows.push([Math.round((ty+ly*sy)*10)/10, Math.round((tx+lx*sx)*10)/10, txt]);
    }
    if(tok!=="q"&&tok!=="Q") st=[];
  }
  rows.sort(function(a,b){ return (b[0]-a[0])||(a[1]-b[1]); });
  var lines=[], cur=[], curY=null;
  rows.forEach(function(r){
    if(curY===null||Math.abs(r[0]-curY)>4.5){ if(cur.length) lines.push(cur.map(function(x){return x[1];}).join(" ")); cur=[[r[1],r[2]]]; curY=r[0]; }
    else { cur.push([r[1],r[2]]); cur.sort(function(a,b){return a[0]-b[0];}); }
  });
  if(cur.length) lines.push(cur.map(function(x){return x[1];}).join(" "));
  return lines;
}
// linhas → avaliação estruturada (null = ausente); só transcreve o impresso, nunca estima
function inbodyParse(lines){
  var all=lines.join("\n");
  var num=function(re,dec){ var m2=all.match(re); if(!m2) return null; var k=dec===2?100:10; return Math.round(parseFloat(m2[1])*k)/k; };
  var o={fonte:"InBody (PDF)"};
  var dm=all.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  o.data=dm?(dm[3]+"-"+dm[2]+"-"+dm[1]):null;
  o.peso=num(/Peso \(kg\)\s+([\d.]+)\s*\(/);
  o.mme=num(/Esquel[ée]tica\s+([\d.]+)/);
  o.gord_kg=num(/Massa de gordura \(kg\)\s+([\d.]+)/);
  o.gord_pct=num(/Percentual de Gordura\s+([\d.]+)/);
  o.imc=num(/[ÍI]ndice de Massa Corporal\s+([\d.]+)/);
  o.visceral=num(/Gordura Visceral\s+([\d.]+)/);
  o.tmb=num(/metab[óo]lica basal\s+([\d.]+)\s*kcal/i);
  o.agua_l=num(/[ÁA]gua corporal total \(L\)\s+([\d.]+)/);
  o.rcq=num(/Cintura-Quadril\s+([\d.]+)/,2);
  o.score=num(/([\d.]+)\/\s*100 pontos/);
  var si=-1; for(var i2=0;i2<lines.length;i2++){ if(/Massa Magra Segmentar/.test(lines[i2])){ si=i2; break; } }
  if(si>=0){
    var packs=[];
    for(var j=si;j<lines.length&&packs.length<3;j++){
      var vals=lines[j].match(/([\d.]+)kg/g);
      if(vals&&(vals.length===4||vals.length===2)&&!/Controle|Ideal/.test(lines[j])) packs.push(vals.map(function(v){ return parseFloat(v); }));
    }
    if(packs.length===3&&packs[0].length===4&&packs[1].length===2&&packs[2].length===4){
      o.seg={ m_bd:packs[0][0], m_be:packs[0][1], g_bd:packs[0][2], g_be:packs[0][3],
              m_tr:packs[1][0], g_tr:packs[1][1],
              m_pd:packs[2][0], m_pe:packs[2][1], g_pd:packs[2][2], g_pe:packs[2][3] };
    }
  }
  return o;
}

let hubSyncPromise=null; // sync em voo: chamadas concorrentes esperam o MESMO resultado (Ajustes nunca mostra status velho como se fosse novo)
function hubSync(force){
  const H=hubHealth();
  if(!H||!hub.connected) return Promise.resolve(false);
  if(hubSyncPromise) return hubSyncPromise;
  if(!force&&hub.lastSync&&(Date.now()-hub.lastSync)<30*60*1000) return Promise.resolve(false); // sob demanda, com folga
  hubSyncPromise=(async function(){
  try{
    const endIso=new Date(Date.now()+60*1000).toISOString();
    const iso=function(d){ return new Date(Date.now()-d*864e5).toISOString(); };
    const read=async function(t,d,l){ try{ const r=await H.readSamples({dataType:t,startDate:iso(d),endDate:endIso,limit:l}); return (r&&r.samples)||[]; }catch(e){ return []; } }; // negado/erro = sem dado (degrada por tipo)
    const wide=!hub.lastSync; // 1ª sincronização puxa mais história pra linha de base nascer
    const winDays=wide?30:14, SLEEP_LIM=3000;
    const sSleep=await read("sleep",winDays,SLEEP_LIM);
    const sW=await read("weight",wide?90:30,500);
    const sHrv=await read("heartRateVariability",30,1500);
    const sFc=await read("restingHeartRate",30,300);
    if(appTearingDown) return false;
    // sono por noite (uma fonte por noite, sem dupla contagem); o campo manual do aparelho sobrevive
    const nights=hubNightsFromSamples(sSleep);
    // bordas da janela nunca sobrescrevem noite boa cacheada: a 1ª noite da janela pode ter
    // sido lida truncada (query começa no meio dela), e limite saturado corta as mais antigas
    const minFull=hubDateShift(todayStr(new Date(Date.now()-winDays*864e5)),1);
    const skipRecon={};
    if(sSleep.length>=SLEEP_LIM){ const ks=Object.keys(nights).sort(); if(ks.length){ skipRecon[ks[0]]=1; delete nights[ks[0]]; } }
    Object.keys(nights).forEach(function(nk){ if(nk<minFull) delete nights[nk]; });
    Object.keys(nights).forEach(function(nk){
      const d=hubDay(nk), prev=d.sono||{};
      if(prev.sleepdev!==undefined) nights[nk].sleepdev=prev.sleepdev;
      d.sono=nights[nk];
    });
    // peso: última amostra de cada dia (plugin devolve kg canônico, independente do locale)
    const byDay={};
    sW.forEach(function(s){ if(s.value>0&&s.startDate){ const k=todayStr(new Date(s.startDate)); const c=byDay[k]; if(!c||String(s.startDate)>String(c.startDate)) byDay[k]=s; } });
    Object.keys(byDay).forEach(function(k){ const d=hubDay(k);
      if(d.peso_wb_ts&&String(byDay[k].startDate)<=d.peso_wb_ts) return; // não rebaixa um write-back recém-feito com amostra mais antiga
      d.peso_kg=Math.round(byDay[k].value*10)/10; d.peso_src=byDay[k].sourceName||"Saúde"; });
    // HRV: mediana do dia · FC de repouso: última do dia — insumo SILENCIOSO da sugestão
    const hv={};
    sHrv.forEach(function(s){ if(s.value>0&&s.startDate){ const k=todayStr(new Date(s.startDate)); (hv[k]=hv[k]||[]).push(s.value); } });
    Object.keys(hv).forEach(function(k){ hubDay(k).hrv_ms=Math.round(hubMedian(hv[k])); });
    const fcd={};
    sFc.forEach(function(s){ if(s.value>0&&s.startDate){ const k=todayStr(new Date(s.startDate)); const c=fcd[k]; if(!c||String(s.startDate)>String(c.startDate)) fcd[k]=s; } });
    Object.keys(fcd).forEach(function(k){ hubDay(k).fc_repouso=Math.round(fcd[k].value); });
    // reconciliação: amostra apagada na Apple Saúde some do cache também (campos manuais sobrevivem)
    const today=todayStr(), from30=hubDateShift(today,-30);
    for(let k=minFull;k<=today;k=hubDateShift(k,1)){
      if(skipRecon[k]) continue;
      const d=hub.days[k]; if(!d||!d.sono||d.sono.horas==null||nights[k]) continue;
      if(d.sono.sleepdev!==undefined) d.sono={sleepdev:d.sono.sleepdev}; else delete d.sono;
    }
    for(let k=from30;k<=today;k=hubDateShift(k,1)){
      const d=hub.days[k]; if(!d) continue;
      if(!byDay[k]&&d.peso_kg>0&&d.peso_src!=="manual"){ delete d.peso_kg; delete d.peso_src; }
      if(!hv[k]&&d.hrv_ms>0) delete d.hrv_ms;
      if(!fcd[k]&&d.fc_repouso>0) delete d.fc_repouso;
    }
    hub.lastSync=Date.now(); saveHub();
    hubRefreshUI();
    return true;
  }catch(e){ return false; }
  finally{ hubSyncPromise=null; }
  })();
  return hubSyncPromise;
}

async function hubWriteWeight(rec){
  // write-back: grava o peso digitado na Apple Saúde SÓ se difere da última amostra (sem loop nem duplicata)
  const H=hubHealth(); if(!H||!hub.connected||appTearingDown) return;
  if(!rec||!rec.date||rec.date>todayStr()||rec.date<hubDateShift(todayStr(),-7)) return; // datas recentes (virada do dia inclusa)
  const kg=numOf(rec.peso); if(!(kg>=30&&kg<=400)) return;
  if(rec.pesoHK!=null&&Math.abs(kg-rec.pesoHK)<0.05) return; // valor ainda é o pré-preenchido: veio da Apple Saúde, não volta pra lá
  const d=hubDay(rec.date);
  if(d.peso_kg>0&&Math.abs(d.peso_kg-kg)<0.05) return;   // mesmo valor que já está na Apple Saúde
  if(d.peso_wb!=null&&Math.abs(d.peso_wb-kg)<0.05) return; // já gravado neste dia: reabrir/refinalizar não duplica
  try{
    const st=await H.checkAuthorization({read:[],write:["weight"]});
    if(!st||!Array.isArray(st.writeAuthorized)||st.writeAuthorized.indexOf("weight")<0) return;
    if(appTearingDown) return;
    const p=rec.date.split("-").map(Number);
    const when=(rec.date===todayStr())?new Date():new Date(p[0],p[1]-1,p[2],12,0,0); // dia arquivado na virada entra como meio-dia local
    await H.saveSample({dataType:"weight",value:kg,startDate:when.toISOString(),endDate:when.toISOString()});
    d.peso_wb=kg; d.peso_wb_ts=new Date().toISOString(); d.peso_kg=Math.round(kg*10)/10; d.peso_src="manual"; saveHub();
    notifApply(); // pesou → re-arma o lembrete de pesagem pra 3 dias à frente (não dispara falso positivo)
  }catch(e){}
}
async function hkPullWorkout(){
  // puxa o treino de HOJE registrado no relógio: kcal (soma do dia), FC média do treino mais longo, duração
  const H=hubHealth(); if(!H||!hub.connected) throw {msg:"Conecte a Apple Saúde em ⚙ Ajustes primeiro."};

// PDF do InBody → avaliação (no aparelho: inflate nativo do navegador, nada sai do telefone)
async function inbodyFromFile(file){
  if(typeof DecompressionStream==="undefined") throw {msg:"Este aparelho não suporta ler PDF direto — use ＋ Nova avaliação e digite os números."};
  const buf=new Uint8Array(await file.arrayBuffer());
  let raw=""; for(let i=0;i<buf.length;i++) raw+=String.fromCharCode(buf[i]); // latin-1 fiel byte a byte
  let text="";
  const re=/stream\r?\n/g; let m;
  while((m=re.exec(raw))){
    const start=m.index+m[0].length, end=raw.indexOf("endstream",start);
    if(end<0) break;
    let data=raw.slice(start,end).replace(/\r?\n$/,"");
    re.lastIndex=end;
    if(data.charCodeAt(0)!==0x78) continue; // só streams zlib
    try{
      const bytes=new Uint8Array(data.length); for(let i=0;i<data.length;i++) bytes[i]=data.charCodeAt(i)&0xFF;
      const ds=new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate")));
      const ab=new Uint8Array(await ds.arrayBuffer());
      let d=""; for(let i=0;i<ab.length;i++) d+=String.fromCharCode(ab[i]);
      if(d.indexOf("TJ")>=0||d.indexOf("Tj")>=0) text+=d+"\n";
    }catch(e){}
  }
  if(!text) throw {msg:"Não achei texto neste PDF — se for foto/scan, use ＋ Nova avaliação (o leitor entende os PDFs do InBody/mynutri)."};
  const o=inbodyParse(inbodyLines(text));
  if(!o.data||(o.peso==null&&o.gord_pct==null&&o.mme==null)) throw {msg:"Este PDF não parece um laudo InBody — não reconheci os campos. Use ＋ Nova avaliação."};
  return o;
}

function avfisBodySVG(a){

    const p=pct(m,g);

      '<span class="bd-t">'+nome+'</span>'+
      '<span class="bd-m">'+(m!=null?fmtNum(m)+" kg":"—")+'</span>'+
      '<span class="bd-bar" aria-hidden="true"><i style="width:'+wM+'%"></i></span>'+
      '<span class="bd-g">'+(g!=null?fmtNum(g)+" kg gordura":"")+(p!=null?' · <b>'+p+'%</b>':"")+'</span></div>';
  };
  // % geral do laudo + massa magra total dos segmentos (soma impressa)
  const cab='<div class="bd-head">'+

    (a.mme!=null?('<div><span class="bd-hv">'+fmtNum(a.mme)+' kg</span><span class="bd-ht">massa muscular</span></div>'):"")+
    (a.peso!=null?('<div><span class="bd-hv">'+fmtNum(a.peso)+' kg</span><span class="bd-ht">peso</span></div>'):"")+

  const fig='<svg class="bd-svg" viewBox="0 0 120 210" role="img" aria-label="silhueta com composição por segmento">'+
    '<g class="bd-fig">'+
    '<circle cx="60" cy="18" r="12"/>'+
    '<path d="M46 34 Q60 30 74 34 L79 44 Q82 58 79 84 Q74 100 66 104 L66 110 L54 110 L54 104 Q46 100 41 84 Q38 58 41 44 Z"/>'+ // tronco com ombros
    '<path d="M40 40 Q32 44 30 58 L27 88 Q27 94 32 94 Q36 94 37 89 L42 60 Z"/>'+   // braço dir
    '<path d="M80 40 Q88 44 90 58 L93 88 Q93 94 88 94 Q84 94 83 89 L78 60 Z"/>'+   // braço esq
    '<path d="M54 112 L52 160 L50 196 Q50 202 55 202 Q59 202 59 196 L60 150 Z"/>'+  // perna dir
    '<path d="M66 112 L68 160 L70 196 Q70 202 65 202 Q61 202 61 196 L60 150 Z"/>'+  // perna esq
    '</g></svg>';
  return '<div class="bd-wrap">'+cab+
    '<div class="bd-grid">'+
    '<div class="bd-col">'+cell("braço direito",s.m_bd,s.g_bd,"r")+cell("perna direita",s.m_pd,s.g_pd,"r")+'</div>'+
    fig+
    '<div class="bd-col">'+cell("braço esquerdo",s.m_be,s.g_be)+cell("perna esquerda",s.m_pe,s.g_pe)+'</div>'+
    '</div>'+
    cell("tronco",s.m_tr,s.g_tr,"c")+
    '<div class="bd-leg">barra = proporção magra/gordura do segmento · <b>%</b> = gordura do segmento · fonte: laudo (gordura segmentar é estimada)</div></div>';
}

function examSerie(k){ return exames.marcadores[k]||[]; }
function examLast(k){ const s=examSerie(k); return s.length?s[s.length-1]:null; }
function examForaCount(){ // fora-de-faixa RUINS (respeitando direção) no exame mais recente
  let n=0, latest="";
  EXAM_NUCLEO.forEach(function(k){ const l=examLast(k); if(l&&l.data>latest) latest=l.data; });
  EXAM_NUCLEO.forEach(function(k){ const l=examLast(k); if(l&&l.data===latest&&examPointBad(l,EXAM_CAT[k].dir)) n++; });
  return {n:n,data:latest};
}
function examMerge(marcs){ // dedup por (data|lab|valor) E por data; pontos do aparelho não são sobrescritos
  let add=0;
  Object.keys(marcs||{}).forEach(function(k){
    if(!EXAM_CAT[k]||!Array.isArray(marcs[k])) return;
    const cur=exames.marcadores[k]=exames.marcadores[k]||[];
    const has={}; cur.forEach(function(p){ has[examDedupKey(p)]=1; has[p.data]=1; });
    marcs[k].forEach(function(p){
      if(!p||!/^\d{4}-\d{2}-\d{2}$/.test(p.data||"")) return;
      if(has[examDedupKey(p)]||has[p.data]) return;
      cur.push({data:p.data, valor:(p.valor!=null&&isFinite(+p.valor))?+p.valor:null, valor_texto:String(p.valor_texto!=null?p.valor_texto:(p.valor!=null?p.valor:"")),
        unidade:String(p.unidade||EXAM_CAT[k].un), ref_impressa:String(p.ref_impressa||""),
        ref_min:(p.ref_min!=null&&isFinite(+p.ref_min))?+p.ref_min:null, ref_max:(p.ref_max!=null&&isFinite(+p.ref_max))?+p.ref_max:null,
        fora_faixa:(p.fora_faixa===1||p.fora_faixa===-1||p.fora_faixa===0)?p.fora_faixa:null,
        laboratorio:String(p.laboratorio||""), ref_fonte:String(p.ref_fonte||"laudo")});
      has[examDedupKey(p)]=1; has[p.data]=1; add++;
    });
    if(!cur.length) delete exames.marcadores[k];
  });
  if(add) saveExames();
  return add;
}

function explainCad(cad){
  const p=String(cad||"").split("-");

  let s="desce em "+p[0]+"s";
  if(+p[1]>0) s+=", segura "+p[1]+"s embaixo";
  s+=", sobe em "+p[2]+"s";
  if(p[3]&&+p[3]>0) s+=", aperta "+p[3]+"s em cima";

}
function explainStim(rr){
  const t=topReps(rr)||12;
  if(t<=8) return "força — cargas altas, poucas reps: recruta o máximo de fibras e ensina o sistema nervoso a gerar tensão";
  if(t<=12) return "hipertrofia por tensão mecânica — a faixa clássica de crescer: pesado o bastante pra tensionar, longo o bastante pra acumular trabalho";
  if(t<=15) return "hipertrofia + estresse metabólico — mais reps, mais 'queimação': cresce com menos carga na articulação";
  return "metabólico/resistência — reps altas com carga leve: conexão, sangue no músculo e zero estresse pra coluna";
}

    if(novoUid) save(LS_DRAFT,draft); // salvar direto (persist() re-agendaria o eco = loop)
    const sess=PROGRAM[draft.session];
    const payload={nome:sess.name, sub:sess.sub, seq:watchSeq, ep:watchEp, reset:reset, date:draft.date, sessKey:draft.session, exercicios:list.map(function(e){
      const t=adjTarget(e), aj=ajkOv(e.id);
      const d=ensureSets(e), ll=lastLogFor(e.id), prev=prevSetsFor(e.id);
      const ai=(d.altIdx>0&&(e.alts||[])[d.altIdx-1])?e.alts[d.altIdx-1]:e.n;
      let pw=0;
      const series=d.sets.map(function(s,si){ // fantasmas resolvidos AQUI (o pulso re-deriva localmente e usa estes como início da cadeia)
        let gP=0; for(let j=si-1;j>=0;j--){ if(d.sets[j].peso){ gP=numOf(d.sets[j].peso); break; } } if(!gP&&ll&&ll.carga) gP=numOf(ll.carga);
        let gR=0; for(let j=si-1;j>=0;j--){ if(d.sets[j].reps){ gR=Math.round(numOf(d.sets[j].reps)); break; } }
        const pi=s.w?0:++pw;
        const ps=(!s.w&&prev&&prev.sets[pi-1])?prev.sets[pi-1]:null; // "últ.:" série a série, igual à tela
        return {tp:(s.w?"W":(s.t==="d"?"D":(s.t==="f"?"F":"N"))), uid:s.uid||0,
                w:(s.peso===""||s.peso==null)?-1:numOf(s.peso),  // -1 = vazio; 0 é registro literal (igual ao telefone)
                r:(s.reps===""||s.reps==null)?-1:Math.round(numOf(s.reps)),
                e:(s.esf!==""&&s.esf!=null)?Math.round(numOf(s.esf)):-1,
                done:!!s.done, gw:gP, gr:gR,
                pv:ps?("últ.: "+(ps.peso||"—")+" kg × "+(ps.reps||"—")+((ps.esf!==""&&ps.esf!=null)?(" · esf "+ps.esf):"")):""};
      });
      return {id:e.id,n:ai,sets:t.sets,rr:t.rr,rir:t.rir,rest:(aj&&aj.rest)||e.rest,
              restS:restSeconds((aj&&aj.rest)||e.rest), rrTop:topReps(t.rr)||0,
              cad:e.cad||"", winc:d.winc||1, series:series};
    })};
    const r=await NP.WatchBridge.sendContext({json:JSON.stringify(payload)});
    if(!silencioso) appInfo("Mandado pro relógio","O treino de hoje ("+list.length+" exercícios) já está no AtlasWatch — dá pra marcar séries, ajustar peso/reps/esforço e adicionar aquecimento pelo pulso.");
    return !!(r&&r.ok!==false);
  }catch(e){ if(!silencioso) appInfo("Não deu","Relógio fora de alcance ou app do pulso fechado."); return false; }
}
/* Delta vindo do pulso: aplica no draft com a MESMA semântica dos toques na tela.
   Endereço por uid (idx é fallback). w/r ausentes = "não mexi"; 0 é valor literal; e=-1 limpa esforço.
   Guardas: dia/sessão do evento têm que bater com o draft, e treino já finalizado não é repovoado —
   evento que não passa é descartado e o eco reconcilia o pulso com a verdade do telefone. */
function applyWatchSetEvt(evt){
  const flipped=draft&&draft.date!==todayStr();
  ensureDraft();
  if(flipped&&currentTab==="hoje") renderHoje(); // o dia virou por evento de fundo: re-renderiza JÁ (senão a tela muta um draft morto)
  const ep=String(evt.ep||"");
  if(ep&&ep!==watchEp){ watchEp=ep; watchSeq=0; watchSeen.clear(); } // pulso reinstalado: adota a época nova
  const seq=Math.round(+evt.seq)||0;
  if(seq>0){
    if(watchSeen.has(seq)) return; // duplicata exata (retry do errorHandler): já aplicada
    watchSeen.add(seq); if(watchSeen.size>400) watchSeen.clear();
    if(seq>watchSeq) watchSeq=seq;
  }
  saveWatchMeta();
  clearWatchCutSeStale();
  if((evt.date&&evt.date!==draft.date)||(evt.sess&&evt.sess!==draft.session)){ scheduleWatchSync(); return; } // evento de outro dia/sessão (fila atrasada): não suja o draft de hoje
  if(!hasLoggedData(draft)&&history.some(function(h){ return h.date===draft.date&&h.session===draft.session; })){ scheduleWatchSync(); return; } // treino já finalizado e draft zerado: não repovoar com evento atrasado
  if(watchCut&&watchCut.date===draft.date&&watchCut.session===draft.session){ scheduleWatchSync(); return; } // sessão DESCARTADA e dia ainda limpo: evento atrasado do pulso não ressuscita o treino (tombstone limpa ao recomeçar)
  const e=sessExList(draft.session).find(function(x){ return x.id===evt.ex; });
  if(!e){ scheduleWatchSync(); return; }
  const d=ensureSets(e), op=evt.op;
  let si=-1;
  if(evt.uid>0) si=d.sets.findIndex(function(x){ return x.uid===evt.uid; });
  if(si<0&&evt.idx!=null){ const ix=Math.round(+evt.idx); if(ix>=0&&ix<d.sets.length&&!(evt.uid>0)) si=ix; } // idx só quando o pulso nem tinha uid (série recém-criada lá)
  const s=si>=0?d.sets[si]:null;
  if(op==="edit"&&s){
    if(evt.w!=null&&evt.w>=0){ s.peso=fmtNum(evt.w); }               // 0 → "0" (registro literal, como o stepper da tela)
    if(evt.r!=null&&evt.r>=0){ s.reps=String(Math.round(evt.r)); delete s.pre; } // pulso mexeu: reps vira registro real
    if(evt.e!=null&&evt.e>=-1){ s.esf = evt.e>=0 ? String(Math.min(10,Math.round(evt.e))) : ""; }
  } else if(op==="done"&&s){
    if(!s.done){
      s.done=true;
      const now=Date.now();
      if(activeRest&&activeRest.id===e.id) s.rest=Math.round((now-activeRest.ts)/1000);
      activeRest={id:e.id,ts:now};
      const aj=ajkOv(e.id);
      startRestCountdown(restSeconds((aj&&aj.rest)||e.rest), true); // true = veio do pulso (que já roda o próprio timer): não manda de volta
      const c=cronoState(); if(!c.run&&c.el===0&&!c.ts){ c.ts=now; c.run=true; } // 1ª série ✓ dá o start se esqueceu
    }
  } else if(op==="undone"&&s){
    if(s.done){ s.done=false; s.rest=null; if(activeRest&&activeRest.id===e.id) activeRest=null; rcdSkip(); }
  } else if(op==="del"&&s){
    d.sets.splice(si,1); if(d.sets.length===0) d.sets.push(newSet(false));
    if(openStrip&&openStrip.ex===e.id){ if(openStrip.si===si) openStrip=null; else if(openStrip.si>si) openStrip.si--; } // régua acompanha o índice
  } else if(op==="add"){
    const sN=newSet(false); const tr=topReps(adjTarget(e).rr); if(tr){ sN.reps=String(tr); sN.pre=true; } d.sets.push(sN);
  } else if(op==="warm"){
    if(openStrip&&openStrip.ex===e.id) openStrip=null;
    const top=Math.max(0,...d.sets.filter(function(x){ return !x.w&&!x.t; }).map(function(x){ return numOf(x.peso); }));
    if(top>0){ const a=newSet(true); a.peso=fmtNum(Math.max(1,Math.round(top*0.7))); const b=newSet(true); b.peso=fmtNum(Math.max(1,Math.round(top*0.5))); d.sets.unshift(a); d.sets.unshift(b); }
    else d.sets.unshift(newSet(true));
  }
  persist(); // persist já agenda o eco pro relógio
  if(currentTab==="hoje") renderHoje();
}
function watchListen(){
  if(!watchOk()||watchListen.on) return; watchListen.on=true;
  try{ NP.WatchBridge.addListener("workoutEnded",function(d){
    ensureDraft();
    clearWatchCutSeStale();
    if(watchCut&&watchCut.date===draft.date&&watchCut.session===draft.session) return; // sessão descartada: resumo do relógio não repovoa kcal/FC nem avisa
    const fills=[];
    if(d.kcal>0&&!String(draft.kcal||"").trim()){ draft.kcal=String(d.kcal); fills.push(d.kcal+" kcal"); }
    if(d.hrAvg>0&&!String(draft.bpm||"").trim()){ draft.bpm=String(d.hrAvg); fills.push("FC "+d.hrAvg); }
    persist();
    if(currentTab==="hoje") renderHoje();
    appInfo("Treino do relógio","⌚ "+(d.durMin?d.durMin+" min · ":"")+d.kcal+" kcal · FC média "+d.hrAvg+(fills.length?" — já preenchi no registro de hoje.":" — os campos já estavam preenchidos, não mexi."));
  }); }catch(e){}
  try{ NP.WatchBridge.addListener("setEvt",function(d){ try{ applyWatchSetEvt(d||{}); }catch(e){} }); }catch(e){}
}

function bumpRir(str){
  // "2–3" -> "3–4", "2" -> "3", "1–2" -> "2–3", "0–2" -> "1–3"
  return str.replace(/\d+/g,n=>String(Math.min(5,parseInt(n,10)+1)));
}
function exMode(){ return draft.autoreg||"v"; }
function adjTarget(e){
  const m=exMode();
  let t;
  if(m==="r") t={sets:2, rr:e.rr, rir:"3", base:true};
  else if(m==="a") t={sets:Math.max(1,e.sets-1), rr:e.rr, rir:bumpRir(e.rir), base:true};
  else t={sets:e.sets, rr:e.rr, rir:e.rir, base:false};
  const aj=(typeof ajkOv==="function")?ajkOv(e.id):null; // ajuste do dia proposto pela IA (aplicado com revisão)
  if(aj){ if(aj.sets) t.sets=aj.sets; if(aj.rr) t.rr=aj.rr; if(aj.rir) t.rir=aj.rir; t.base=true; t.ai=true; }
  return t;
}
function lastLogFor(id){
  const num=s=>parseFloat(String(s||"0").replace(",","."))||0;
  for(let i=history.length-1;i>=0;i--){
    const h=history[i];
    if(h.date===draft.date) continue;
    const e=h.ex&&h.ex[id];
    if(!e) continue;
    if(Array.isArray(e.sets)){ // modelo por série — só séries realizadas
      const work=e.sets.filter(s=>!s.w && (s.done||s.esf) && (s.peso||s.reps));
      if(work.length){ let best=work[0]; work.forEach(s=>{ if(num(s.peso)>num(best.peso)) best=s; }); return {carga:best.peso,reps:best.reps,date:h.date}; }
    } else if(e.carga||e.reps){ // modelo antigo
      return {carga:e.carga,reps:e.reps,rir:e.rir,date:h.date};
    }
  }
  return null;
}

function bestFor(id){
  let best=0,has=false;
  history.forEach(h=>{ if(h.date===draft.date) return; const e=h.ex&&h.ex[id]; if(!e) return;
    if(Array.isArray(e.sets)){ e.sets.filter(s=>!s.w&&(s.done||s.esf)).forEach(s=>{ const p=numOf(s.peso); if(p>0){ has=true; if(p>best) best=p; } }); }
    else if(e.carga){ const p=numOf(e.carga); if(p>0){ has=true; if(p>best) best=p; } }
  });
  return has?best:null;
}

      ? `<div class="h">Semana de deload</div><p style="color:var(--text)">Cargas −30–40%, metade das séries, RIR alto. Não é dia de recorde — é o corpo consolidando o bloco. Os alvos abaixo são a referência cheia; alivie conscientemente.</p>`
      : `<div class="h">Programa concluído 🎉</div><p>As 12 semanas + deload fecharam. Peça o próximo bloco ao Claude (Cowork) a partir do histórico exportado e ajuste em ⚙ Ajustes → Semana. Enquanto isso, os alvos abaixo repetem a semana 12.</p>`;
    v.appendChild(dl);
  }
  const pick=head.querySelector("#sessPick");
  ORDER.forEach(k=>{
    const s=PROGRAM[k];
    const b=el("button","sp"+(k===draft.session?" on":""),`${s.name}<span class="d">${s.day.slice(0,3)}</span>`);
    b.onclick=()=>{ switchSession(k); };
    pick.appendChild(b);
  });

  // ----- autorregulação (sutil) + peso -----
  // peso da Apple Saúde: valor de HOJE pré-preenche; o último conhecido vira ghost no placeholder
  const hkW=hubLatestWeight(draft.date,7);
  if(!draft.peso&&!draft.pesoEdit&&hkW&&hkW.date===draft.date){ draft.peso=fmtNum(hkW.kg); draft.pesoHK=hkW.kg; persist(); }
  // sugestão do sono: só quando o usuário ainda não escolheu — pré-seleciona (tracejado), NUNCA aplica
  const sug=(draft.autoreg==null)?hubSuggestFrom(hub.days,draft.date):null;
  const arCls=k=>draft.autoreg===k?"on":(sug&&sug.level===k?"sug":"");
  const auto=el("div","autobar");
  auto.innerHTML=`
    <div class="autobar-seg">
      <button class="ar v ${arCls("v")}" data-ar="v" aria-pressed="${draft.autoreg==="v"}" aria-label="autorregulação verde${sug&&sug.level==="v"?" (sugerida pelo sono)":""}"><span class="ard" aria-hidden="true"></span>Verde</button>
      <button class="ar a ${arCls("a")}" data-ar="a" aria-pressed="${draft.autoreg==="a"}" aria-label="autorregulação amarela${sug&&sug.level==="a"?" (sugerida pelo sono)":""}"><span class="ard" aria-hidden="true"></span>Amarelo</button>
      <button class="ar r ${arCls("r")}" data-ar="r" aria-pressed="${draft.autoreg==="r"}" aria-label="autorregulação vermelha${sug&&sug.level==="r"?" (sugerida pelo sono)":""}"><span class="ard" aria-hidden="true"></span>Vermelho</button>
    </div>
    <div class="autobar-peso"><input type="text" inputmode="decimal" data-ci="peso" value="${(draft.peso||"").replace(/"/g,"&quot;")}" placeholder="${(!draft.peso&&hkW)?fmtNum(hkW.kg):"peso"}"><span>kg</span></div>`;
  v.appendChild(auto);
  const arHint=el("div","arhint"); v.appendChild(arHint);
  auto.querySelectorAll(".ar").forEach(b=>b.onclick=()=>{ draft.autoreg=b.dataset.ar; persist(); renderHoje(); });
  auto.querySelector('[data-ci="peso"]').addEventListener("input",function(){ draft.peso=this.value; draft.pesoEdit=true; persist(); });
  const helpTxt={ v:"Treino completo, progressão normal.", a:"−1 série, RIR +1, e corte o último de cada grupo (marcado abaixo).", r:"Versão mínima: 3 compostos × 2 séries RIR 3 — ou caminhada Zona 2.", "":"Toque pra ajustar o treino de hoje à sua recuperação." };
  if(sug){ const why=sug.reasons.length?sug.reasons.join(" · "):(sug.nights14<14?"noite completa":"noite dentro do seu normal");
    arHint.innerHTML='<span class="arnote">sugerido pelo seu sono ('+esc(why)+') · toque pra confirmar ou mudar</span>'+(sug.nights14<14?' <span style="color:var(--mute)">· coletando sua linha de base ('+sug.nights14+'/14)</span>':""); }
  else if(weekContext() && draft.autoreg==="a"){ arHint.innerHTML=helpTxt.a+' <span class="arnote">· em fase de sono irregular, amarelo é o padrão.</span>'; }
  else arHint.textContent=helpTxt[draft.autoreg||""];

  // ----- sono da noite + toggle do aparelho (único campo manual do pilar) -----
  const nSono=(hub.days[draft.date]||{}).sono;
  if(IS_NATIVE||nSono){
    const sl=el("div","sleepline");
    const devOn=!(nSono&&nSono.sleepdev===false);
    let info;
    if(nSono&&nSono.horas!=null){
      info="😴 "+hubFmtH(nSono.horas)+(nSono.estagios?(" · profundo "+hubFmtMin(nSono.profundo_min||0)+" · REM "+hubFmtMin(nSono.rem_min||0)):"")
        +(nSono.src?' <span class="sl-src">'+esc(nSono.src)+"</span>":"");
    } else info='<span class="sl-src">sem registro de sono na Apple Saúde esta noite</span>';
    sl.innerHTML='<span class="sl-info">'+info+'</span><button class="slchip '+(devOn?"on":"off")+'" id="devChip" aria-pressed="'+(devOn?"true":"false")+'">'+(devOn?NIGHT_TXT.on:NIGHT_TXT.off)+'</button>';
    v.appendChild(sl);
    sl.querySelector("#devChip").onclick=function(){
      if(draft.date!==todayStr()){ renderHoje(); return; } // virada do dia com o app aberto: re-renderiza (ensureDraft arquiva ontem) e o toque seguinte grava na noite certa
      const d=hubDay(draft.date); d.sono=d.sono||{};
      d.sono.sleepdev=(d.sono.sleepdev===false); // false→true, true/indefinido→false
      saveHub(); renderHoje();
    };
  }

  // ----- CRISE LOMBAR: protocolo seguro no lugar da sessão (estado distinto do vermelho de fadiga) -----
  if(criseHoje()&&draft.date===todayStr()){
    if(draft.crise!==true){ draft.crise=true; persist(); }
    if(redflagHoje()){
      const rf=el("div","redflagbox");
      rf.innerHTML=`<div class="h">⚠️ Dor irradiada ou formigamento</div>
        <p>Dor que desce pra perna, formigamento ou dormência <b>não é caso de treino nem de protocolo</b> — é caso de avaliação. Procure atendimento hoje. Movimento tolerável (andar devagar em casa) é ok; carga, não.</p>`;
      v.appendChild(rf);
    } else {
      const cb=el("div","crisebox");
      cb.innerHTML=`<div class="h">🔻 Dor nas costas hoje — protocolo seguro</div>
        <p>Sem treino de força hoje. Zero carga na coluna, zero flexão com peso — só o que não dói:</p>
        <ul>
          <li><b>Caminhada Zona 2</b> — 20–40 min, ritmo de conversa</li>
          <li><b>Prancha frontal</b> — 3×20–30s</li>
          <li><b>Prancha lateral</b> — 2×15–20s por lado</li>
          <li><b>Bird-dog</b> — 3×8 por lado, lento</li>
          <li><b>Dead bug</b> — 3×8 por lado, lombar colada no chão</li>
        </ul>
        <p style="color:var(--dim)">Regra única: se doer, corta. Amanhã reavalia na Home.</p>
        <button class="btn-z2" id="criseDone" style="margin-top:4px">${draft.criseDone?"✓ Registrado: fiz o protocolo":"Fiz o protocolo de hoje"}</button>`;
      v.appendChild(cb);
      cb.querySelector("#criseDone").onclick=function(){ draft.criseDone=!draft.criseDone; persist(); renderHoje(); };
    }
    const ngc=el("div","card");
    ngc.innerHTML=`<div class="section-label">Como está a dor / o dia</div>
      <textarea data-ci="nota" placeholder="Onde dói, o que alivia, o que piora… (vai pro Diário)" style="width:100%;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px;padding:11px;color:var(--text);font-size:14px;resize:none;min-height:64px;outline:none;font-family:var(--body);">${esc(draft.nota||"")}</textarea>`;
    v.appendChild(ngc);
    ngc.querySelector("textarea").addEventListener("input",function(){ draft.nota=this.value; persist(); });
    updateFinishBar();
    return;
  }
  if(draft.crise===true&&!criseHoje()){ draft.crise=false; draft.criseDone=false; persist(); } // dor desmarcada na Home

  // ----- academia -----
  const gb=el("div","gymbar");
  const gyms=allGyms();
  if(!draft.gym) draft.gym=settings.lastGym||gyms[0]||"";
  gb.innerHTML=`<span class="gym-ic">📍</span><select id="gymSel">${!draft.gym?'<option value="" selected>— escolher academia —</option>':""}${gyms.map(g=>'<option '+(g===draft.gym?"selected":"")+'>'+esc(g)+'</option>').join("")}<option value="__add__">+ Adicionar academia…</option></select>`;
  v.appendChild(gb);
  gb.querySelector("#gymSel").onchange=function(){
    if(this.value==="__add__"){ this.value=draft.gym||""; openAddGym(); return; } // restaura já: fechar a folha por gesto não pode deixar o select preso no "__add__"
    draft.gym=this.value; settings.lastGym=this.value; save(LS_SET,settings); persist();
  };

  // ----- warmup -----
  const w=el("div","mini");
  w.style.alignItems="flex-start";
  w.innerHTML=`<div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v3M5.6 5.6l2.1 2.1M3 12h3M5.6 18.4l2.1-2.1M12 18v3M18.4 18.4l-2.1-2.1M21 12h-3M18.4 5.6l-2.1 2.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <div class="tx"><div class="tt">Aquecimento & prehab</div>
      <div class="ds">Cardio leve 3–5 min · ${WARM[sess.warm].map(x=>x.n+" — "+x.s).join(" · ")}</div>
      <button class="warm-more">ver como fazer ▾</button>
      <div class="warm-det" style="display:none">
        <div class="wd-item"><b>1. Cardio leve — 3–5 min</b><br>Bike, elíptico ou esteira inclinada em ritmo confortável. Só pra subir a temperatura e a frequência cardíaca — sem gastar energia do treino.</div>
        ${WARM[sess.warm].map((x,i)=>`<div class="wd-item"><b>${i+2}. ${esc(x.n)} — ${esc(x.s)}</b><br>${esc(x.c)}</div>`).join("")}
        <div class="wd-item" style="color:var(--mute)">Leve e sem pressa: aquecimento não é treino. Se algo doer aqui, é sinal amarelo pro dia.</div>
      </div>
    </div>
    <div class="toggle ${draft.warmDone?"on":""}" id="warmTog" role="switch" tabindex="0" aria-checked="${!!draft.warmDone}" aria-label="aquecimento feito"></div>`;
  v.appendChild(w);
  w.querySelector("#warmTog").onclick=function(){ draft.warmDone=!draft.warmDone; this.classList.toggle("on"); this.setAttribute("aria-checked",String(draft.warmDone)); persist(); };
  w.querySelector(".warm-more").onclick=function(){ const det=w.querySelector(".warm-det"); const open=det.style.display==="none"; det.style.display=open?"block":"none"; this.textContent=open?"esconder ▴":"ver como fazer ▾"; };

  // ----- VERMELHO: modo mínimo -----
  if(draft.autoreg==="r"){
    const rm=el("div","redmode");
    rm.innerHTML=`<div class="h">Versão mínima — dia vermelho</div>
      <p>3 compostos × 2 séries · RIR 3. <b>Ou</b> só uma caminhada Zona 2 — presença vale mais que intensidade.</p>
      <button class="btn-z2" id="z2only"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 5.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM7 21l3-6 4 2 1 5M14 13l-1-4-4 1-2 4M16 11l3 1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${draft.z2only?"✓ Registrado: fiz só caminhada Zona 2":"Hoje fiz só caminhada Zona 2"}</button>`;
    v.appendChild(rm);
    rm.querySelector("#z2only").onclick=()=>{ draft.z2only=!draft.z2only; persist(); renderHoje(); };
  }

  // ----- exercises -----
  if(!(draft.autoreg==="r" && draft.z2only)){
    let full=sessExList(draft.session);
    // ajuste do dia da IA: pulados saem, descanso trocado vale no cronômetro
    full=full.filter(function(e){ const aj=ajkOv(e.id); return !(aj&&aj.skip); })
      .map(function(e){ const aj=ajkOv(e.id); return (aj&&aj.rest)?Object.assign({},e,{rest:aj.rest}):e; });
    const exList = draft.autoreg==="r" ? full.slice(0,3) : full;
    const prog=el("div","ex-progress");
    prog.innerHTML=`<div class="t">Exercícios</div><div class="c" id="exCount"></div>`;
    v.appendChild(prog);
    const pbar=el("div","pbar",`<i id="pbarFill"></i>`); v.appendChild(pbar);

    // por que este treino + ajuste da IA
    const xrow=el("div","xtools");
    xrow.innerHTML='<button class="xtool" id="btnExplain">🎓 por que este treino?</button>'+
      (draft.ajk?('<button class="xtool ai on" id="btnAi">🤖 ajustado pela IA · desfazer</button>')
        :('<button class="xtool ai" id="btnAi">🤖 ajustar com a IA</button>'))+
      (watchOk()?'<button class="xtool" id="btnWatch">⌚ mandar pro relógio</button>':"");
    v.appendChild(xrow);
    if(draft.ajk){ const bn=el("div","aibanner"); bn.textContent="IA: "+draft.ajk.resumo; v.appendChild(bn); }
    xrow.querySelector("#btnExplain").onclick=openExplain;
    xrow.querySelector("#btnAi").onclick=draft.ajk?aiAdjustUndo:aiAdjustAsk;
    if(watchOk()) xrow.querySelector("#btnWatch").onclick=function(){ watchSendSession(false); };

    exList.forEach((e,idx)=>{ v.appendChild(renderEx(e,idx)); });
  }

  // ----- core -----
  const c=el("div","mini");
  c.innerHTML=`<div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2a4 4 0 0 1 4 4c0 2-1 3-1 5l1 11M12 2a4 4 0 0 0-4 4c0 2 1 3 1 5L8 22M9 11h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="tx"><div class="tt">Core do dia · ${sess.core.name}</div><div class="ds">${sess.core.scheme} — ${sess.core.desc}</div></div>
    <div class="toggle ${draft.coreDone?"on":""}" id="coreTog" role="switch" tabindex="0" aria-checked="${!!draft.coreDone}" aria-label="core do dia feito"></div>`;
  v.appendChild(c);
  c.querySelector("#coreTog").onclick=function(){ draft.coreDone=!draft.coreDone; this.classList.toggle("on"); this.setAttribute("aria-checked",String(draft.coreDone)); persist(); };

  // ----- cardio zona 2 -----
  const cz=el("div","mini");
  cz.innerHTML=`<div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12h4l2 5 4-12 2 7h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="tx"><div class="tt">Cardio Zona 2</div><div class="ds">20–30 min, ritmo de conversa (FC ~115–135)</div>
      <div class="z2"><input type="text" inputmode="numeric" id="cardioMin" value="${draft.cardioMin||""}" placeholder="25"><span class="u">min</span></div></div>
    <div class="toggle ${draft.cardioDone?"on":""}" id="cardioTog" role="switch" tabindex="0" aria-checked="${!!draft.cardioDone}" aria-label="cardio zona 2 feito"></div>`;
  v.appendChild(cz);
  cz.querySelector("#cardioTog").onclick=function(){ draft.cardioDone=!draft.cardioDone; this.classList.toggle("on"); this.setAttribute("aria-checked",String(draft.cardioDone)); persist(); };
  cz.querySelector("#cardioMin").addEventListener("input",function(){ draft.cardioMin=this.value; persist(); });

  // ----- nota geral -----
  const ng=el("div","card");
  ng.innerHTML=`<div class="section-label">Como foi o treino</div>
    ${IS_NATIVE?`<button class="eb ghost" id="hkPull" style="width:100%;margin:0 0 10px">⌚ Puxar do relógio (kcal · FC · duração)</button><div id="hkPullOut" style="font-size:12px;color:var(--mute);margin:-4px 0 10px"></div>`:""}
    <div class="checkin" style="margin:0 0 10px">
      <div class="field"><label>Calorias do treino</label><div class="inline-input"><input type="text" inputmode="numeric" data-ci="kcal" value="${(draft.kcal||"").replace(/"/g,"&quot;")}" placeholder="420"><span class="suffix">kcal</span></div></div>
      <div class="field"><label>FC média</label><div class="inline-input"><input type="text" inputmode="numeric" data-ci="bpm" value="${(draft.bpm||"").replace(/"/g,"&quot;")}" placeholder="120"><span class="suffix">bpm</span></div></div>
    </div>
    <textarea data-ci="nota" placeholder="Energia, dores, ajustes que fez, sensações… (vai pro Diário)" style="width:100%;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px;padding:11px;color:var(--text);font-size:14px;resize:none;min-height:64px;outline:none;font-family:var(--body);">${esc(draft.nota||"")}</textarea>`;
  v.appendChild(ng);
  ng.querySelector("textarea").addEventListener("input",function(){ draft.nota=this.value; persist(); });
  ng.querySelector('[data-ci="kcal"]').addEventListener("input",function(){ draft.kcal=this.value; persist(); });
  ng.querySelector('[data-ci="bpm"]').addEventListener("input",function(){ draft.bpm=this.value; persist(); });
  if(IS_NATIVE&&ng.querySelector("#hkPull")) ng.querySelector("#hkPull").onclick=async function(){
    const btn=this, out=ng.querySelector("#hkPullOut");
    btn.disabled=true; out.textContent="Lendo o relógio…";
    try{
      const w=await hkPullWorkout();
      // preenche só o que está VAZIO — o que você digitou é seu
      const fills=[];
      if(w.kcal&&!String(draft.kcal||"").trim()){ draft.kcal=String(w.kcal); fills.push("kcal"); }
      if(w.bpm&&!String(draft.bpm||"").trim()){ draft.bpm=String(w.bpm); fills.push("FC"); }
      persist();
      ng.querySelector('[data-ci="kcal"]').value=draft.kcal||""; ng.querySelector('[data-ci="bpm"]').value=draft.bpm||"";
      out.textContent="⌚ "+(w.n>1?w.n+" treinos hoje · ":"")+(w.durMin?w.durMin+" min · ":"")+(w.kcal?w.kcal+" kcal":"")+(w.bpm?" · FC média "+w.bpm:"")+(fills.length?"":" — campos já preenchidos, não mexi");
    }catch(e){ out.textContent=(e&&e.msg)||"Não consegui ler o relógio."; }
    btn.disabled=false;
  };

  updateFinishBar();
}

function renderEx(e,idx,noAnim){
  const t=adjTarget(e);
  const d=ensureSets(e);
  const ll=lastLogFor(e.id);
  const isCut = draft.autoreg==="a" && e.cut;
  const allDone = d.sets.length>0 && d.sets.every(s=>s.done);
  const isOpen=!!d.open; // minimizado por padrão; toque no cabeçalho expande
  const workN=d.sets.filter(s=>!s.w).length, doneW=d.sets.filter(s=>!s.w&&s.done).length;
  const card=el("div","ex"+(allDone?" done":"")+(isCut?" cut":"")+(d.superNext?" superset":"")+(isOpen?"":" min"));
  if(noAnim) card.style.animation="none"; else card.style.animationDelay=(idx*0.04)+"s"; // expandir/recolher não re-anima (sem piscar)
  card.dataset.id=e.id;
  const alts=e.alts||[];
  const ai=(d.altIdx!=null)?d.altIdx:(d.alt?1:0);
  const name=(ai>0&&alts[ai-1])?alts[ai-1]:e.n;
  card.innerHTML=`
    <div class="ex-top">
      <div class="ex-num">${idx+1}</div>
      <div class="ex-main">
        <div class="ex-name">${esc(name)}</div>
        <div class="ex-target">
          ${t.base?`<span class="tg base">${e.sets}×${esc(e.rr)} · RIR ${esc(e.rir)}</span>`:""}
          <span class="tg key">${t.sets}×${esc(t.rr)}</span>
          <span class="tg key">RIR ${esc(t.rir)}</span>
          <span class="tg">desc ${esc(e.rest)}</span>
          ${e.cad?`<span class="tg">cad ${esc(e.cad)}</span>`:""}
          ${e.pause?`<span class="tg">pausa ${esc(e.pause)}</span>`:""}
          <span class="tg mus">${esc(e.g)} · ${stimOf(t.rr)}</span>
          ${!isOpen?`<span class="tg key">${doneW}/${workN} ✓</span>`:""}
        </div>
        ${isCut?`<span class="cutbadge">corte sugerido hoje</span>`:""}
        ${ll?`<div class="lastlog"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 8v4l3 2M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Última vez: ${ll.carga?ll.carga+"kg · ":""}${ll.reps||"—"} (${prettyDate(ll.date)})</div>`
          :`<div class="lastlog empty">Sem registro anterior — esta é a referência.</div>`}
        <span class="prbadge" style="display:none">🏆 Recorde de carga!</span>
        ${d.superNext?'<div class="ss-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M8 6h8M8 6a3 3 0 0 0 0 6h8a3 3 0 0 1 0 6H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> supersérie com o próximo</div>':""}
      </div>
      <div class="ex-chev"><svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="setsticker">
      <div class="setlist"></div>
      <div class="setblk-ctrls">
        <button class="addset" data-act="addset"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Adicionar série</button>
        <button class="warmcalc" data-act="warmcalc">🔥 aquecimento</button>
      </div>
      <div class="stepsel"><span>passo do peso:</span><button class="sc" data-winc="1">1</button><button class="sc" data-winc="2.5">2,5</button><button class="sc" data-winc="5">5</button><span>kg</span></div>
      <div class="settypelegend">Toque no nº pra alternar tipo (<b style="color:var(--amarelo)">W</b>/<b style="color:var(--tech)">D</b>/<b style="color:var(--vermelho)">F</b>) · toque no kg/reps pra abrir a régua de rolagem.</div>
      <div class="restbar" data-rest="${e.id}"><span>⏱ descanso · alvo ${esc(e.rest)}</span> <span class="rused" style="margin-left:auto"></span></div>
    </div>
    <div class="notewrap"><textarea data-f="nota" placeholder="nota do exercício (opcional)">${esc(d.nota||"")}</textarea></div>
    <div class="ex-actions">
      <button class="btn-detail" data-act="detail"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 16v-4M12 8h.01M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Como fazer</button>
      <button class="btn-detail" data-act="edit">✎ ajustar</button>
      <button class="ss-toggle ${d.superNext?"on":""}" data-act="ss"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 6h8M8 6a3 3 0 0 0 0 6h8a3 3 0 0 1 0 6H8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>${d.superNext?"✓ supersérie":"supersérie"}</button>
    </div>
    <div class="detail">
      <div class="d-row"><span class="lbl">Como fazer</span>${esc(e.c||"")}</div>
      ${e.t?`<div class="d-row"><span class="lbl tw">Trabalha</span>${esc(e.t)}</div>`:""}
      ${alts.length?`<div class="d-row"><span class="lbl al">Alternativas</span><div class="altlist">
        <button class="altswap ${ai===0?"on":""}" data-alt="0">${ai===0?"✓ ":""}${esc(e.n)}</button>
        ${alts.map((a,j)=>`<button class="altswap ${ai===j+1?"on":""}" data-alt="${j+1}">${ai===j+1?"✓ ":""}${esc(a)}</button>`).join("")}
      </div></div>`:""}
    </div>`;

  card.querySelector('[data-f="nota"]').addEventListener("input",function(){ d.nota=this.value; persist(); });
  card.querySelector('[data-act="detail"]').onclick=function(){ card.querySelector(".detail").classList.toggle("open"); };
  card.querySelectorAll("[data-alt]").forEach(b=>b.onclick=function(){ d.altIdx=+this.dataset.alt; d.alt=d.altIdx>0; persist(); renderHoje(); });
  card.querySelector('[data-act="edit"]').onclick=function(){ openExEditor(draft.session,e.id); };
  card.querySelector('[data-act="ss"]').onclick=function(){ d.superNext=!d.superNext; persist(); renderHoje(); };
  card.querySelector(".ex-top").onclick=function(){ d.open=!d.open; persist(); card.replaceWith(renderEx(e,idx,true)); };

  renderSetList(card,e,d,ll);
  return card;
}

/* séries realizadas da última vez que este exercício apareceu (qualquer sessão) — para o "últ.:" por série */
function prevSetsFor(id){
  for(let i=history.length-1;i>=0;i--){
    const h=history[i]; if(draft && h.date===draft.date) continue;
    const e=h.ex&&h.ex[id]; if(!e) continue;
    if(Array.isArray(e.sets)){ const w=e.sets.filter(s=>!s.w&&(s.peso||s.reps||s.esf)); if(w.length) return {sets:w,date:h.date}; }
    else if(e.carga||e.reps) return {sets:[{peso:e.carga||"",reps:e.reps||"",esf:""}],date:h.date};
  }
  return null;
}
function renderSetList(card,e,d,ll){
  const list=card.querySelector(".setlist");
  const winc=d.winc||1;
  const prev=prevSetsFor(e.id);
  let wn=0, pw=0;
  list.innerHTML=d.sets.map((s,si)=>{
    const tag=s.w?"W":(s.t==="d"?"D":(s.t==="f"?"F":(++wn)));
    const pi=s.w?0:++pw;
    const ps=(!s.w&&prev&&prev.sets[pi-1])?prev.sets[pi-1]:null;
    const cls=s.w?" warm":(s.t==="d"?" drop":(s.t==="f"?" fail":""));
    let gP=""; for(let j=si-1;j>=0;j--){ if(d.sets[j].peso){ gP=d.sets[j].peso; break; } } if(!gP && ll && ll.carga) gP=ll.carga;
    let gR=""; for(let j=si-1;j>=0;j--){ if(d.sets[j].reps){ gR=d.sets[j].reps; break; } }
    const pesoDisp = s.peso ? (s.peso+' <span class="u">kg</span>') : ('<span class="ghost">'+(gP||'–')+'</span> <span class="u">kg</span>');
    const repsDisp = s.reps ? s.reps : ('<span class="ghost">'+(gR||'–')+'</span>');
    const esfOn = s.esf!=="" && s.esf!=null;
    return `<div class="setblk${s.done?" done":""}${cls}" data-si="${si}">
      <div class="setblk-a">
        <button class="settag" data-sa="type" title="tipo da série">${tag}</button>
        <div class="stp">
          <button class="stp-b" data-stp="peso:-1">−</button>
          <button class="stp-v" data-copy="peso">${pesoDisp}</button>
          <button class="stp-b" data-stp="peso:1">+</button>
        </div>
        <div class="stp">
          <button class="stp-b" data-stp="reps:-1">−</button>
          <button class="stp-v" data-copy="reps">${repsDisp}</button>
          <button class="stp-b" data-stp="reps:1">+</button>
        </div>
        <button class="setdone${s.done?" on":""}" data-sa="done"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="setdel" data-sa="del" aria-label="remover">×</button>
      </div>
      ${ps?`<div class="setprev">últ.: ${esc(ps.peso||"—")} kg × ${esc(ps.reps||"—")}${(ps.esf!==""&&ps.esf!=null)?" · esf "+esc(ps.esf):""}</div>`:""}
      <div class="valstrip hide" data-vstrip></div>
      <div class="setblk-b">
        <button class="esfchip" data-sa="esf">${esfOn?('<span class="dotc" style="background:'+esfColor(s.esf)+'"></span>Esforço '+s.esf):'<span class="dotc"></span>Esforço'}</button>
      </div>
      <div class="esfscale hide" data-scale>${Array.from({length:11},(_,v)=>'<button class="esfb'+((esfOn&&+s.esf===v)?" on":"")+'" data-esf="'+v+'" style="background:'+esfColor(v)+'">'+v+'</button>').join("")}</div>
    </div>`;
  }).join("");

  let lastRest=null; d.sets.forEach(s=>{ if(s.rest!=null) lastRest=s.rest; });
  card.querySelector(".rused").textContent = lastRest!=null ? ("· última "+fmtRest(lastRest)) : "";
  const pr=card.querySelector(".prbadge");
  if(pr){ const curTop=Math.max(0,...d.sets.filter(s=>!s.w).map(s=>numOf(s.peso))); const best=bestFor(e.id); pr.style.display=(best!=null && curTop>0 && curTop>best)?"inline-flex":"none"; }
  card.querySelectorAll('[data-winc]').forEach(b=>b.classList.toggle("on", parseFloat(b.dataset.winc)===winc));

  const rerender=()=>{ persist(); renderSetList(card,e,d,ll); card.classList.toggle("done", d.sets.length>0 && d.sets.every(x=>x.done)); updateFinishBar(); };
  const ghostOf=(si,field)=>{ for(let j=si-1;j>=0;j--){ if(d.sets[j][field]) return d.sets[j][field]; } return (field==="peso" && ll && ll.carga)? ll.carga : ""; };

  list.querySelectorAll("[data-stp]").forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si; const p=btn.dataset.stp.split(":"); const field=p[0], dir=parseInt(p[1],10);
    btn.onclick=()=>{
      const s=d.sets[si], step=field==="peso"?(d.winc||1):1;
      if(s[field]==="" || s[field]==null){ const g=ghostOf(si,field); s[field]= g ? String(g) : (dir>0? (field==="peso"?fmtNum(step):"1") : "0"); }
      else { const v=Math.max(0, numOf(s[field]) + dir*step); s[field]=field==="peso"?fmtNum(v):String(Math.round(v)); }
      if(field==="reps") delete s.pre; // usuário mexeu: reps agora é registro real
      persist(); renderSetList(card,e,d,ll); updateFinishBar();
    };
  });
  list.querySelectorAll("[data-copy]").forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si, field=btn.dataset.copy;
    btn.onclick=()=>{ // abre/fecha a régua de rolagem
      if(openStrip && openStrip.ex===e.id && openStrip.si===si && openStrip.field===field) openStrip=null;
      else openStrip={ex:e.id,si:si,field:field};
      renderSetList(card,e,d,ll);
    };
  });
  list.querySelectorAll('[data-sa="esf"]').forEach(btn=>{
    btn.onclick=()=>{ btn.closest(".setblk").querySelector("[data-scale]").classList.toggle("hide"); };
  });
  list.querySelectorAll("[data-esf]").forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si;
    btn.onclick=()=>{ const s=d.sets[si], v=btn.dataset.esf; s.esf=(s.esf===v?"":v); persist(); renderSetList(card,e,d,ll); };
  });
  list.querySelectorAll('[data-sa="type"],[data-sa="done"],[data-sa="del"]').forEach(btn=>{
    const si=+btn.closest(".setblk").dataset.si, act=btn.dataset.sa;
    btn.onclick=()=>{
      const s=d.sets[si];
      if(act==="type"){ if(!s.w && !s.t){ s.w=true; } else if(s.w){ s.w=false; s.t="d"; } else if(s.t==="d"){ s.t="f"; } else { s.t=""; } }
      else if(act==="del"){ d.sets.splice(si,1); if(d.sets.length===0) d.sets.push(newSet(false));
        if(openStrip&&openStrip.ex===e.id){ if(openStrip.si===si) openStrip=null; else if(openStrip.si>si) openStrip.si--; } } // régua acompanha o índice
      else if(act==="done"){
        s.done=!s.done;
        if(s.done){ const now=Date.now(); if(activeRest && activeRest.id===e.id) s.rest=Math.round((now-activeRest.ts)/1000); activeRest={id:e.id,ts:now}; const aj=ajkOv(e.id); startRestCountdown(restSeconds((aj&&aj.rest)||e.rest));
          const c=cronoState(); if(!c.run && c.el===0 && !c.ts){ c.ts=now; c.run=true; } } // 1ª série ✓ dá o start se esqueceu
        else { s.rest=null; if(activeRest && activeRest.id===e.id) activeRest=null; rcdSkip(); }
      }
      rerender();
    };
  });
  card.querySelector('[data-act="addset"]').onclick=function(){ const s=newSet(false); const tr=topReps(adjTarget(e).rr); if(tr){ s.reps=String(tr); s.pre=true; } d.sets.push(s); rerender(); };
  card.querySelector('[data-act="warmcalc"]').onclick=function(){
    if(openStrip&&openStrip.ex===e.id) openStrip=null; // unshift desloca índices — fecha a régua
    const top=Math.max(0,...d.sets.filter(s=>!s.w && !s.t).map(s=>numOf(s.peso)));
    if(top>0){ const a=newSet(true); a.peso=fmtNum(Math.max(1,Math.round(top*0.7))); const b=newSet(true); b.peso=fmtNum(Math.max(1,Math.round(top*0.5))); d.sets.unshift(a); d.sets.unshift(b); }
    else { d.sets.unshift(newSet(true)); }
    rerender();
  };
  card.querySelectorAll('[data-winc]').forEach(b=>{ b.onclick=function(){ d.winc=parseFloat(b.dataset.winc); persist(); renderSetList(card,e,d,ll); }; });
  if(openStrip && openStrip.ex===e.id && d.sets[openStrip.si]) buildValStrip(card,e,d,ll,openStrip.si,openStrip.field);
}

/* régua de rolagem para escolher kg/reps (abre ao tocar no valor) */
function buildValStrip(card,e,d,ll,si,field){
  const blk=card.querySelector('.setblk[data-si="'+si+'"]'); if(!blk) return;
  const strip=blk.querySelector('[data-vstrip]'); if(!strip) return;
  // só uma régua aberta por vez: esvazia e esconde as outras (mesmo em cards que não foram re-renderizados)
  document.querySelectorAll("[data-vstrip]").forEach(x=>{ if(x!==strip){ x.classList.add("hide"); x.innerHTML=""; } });
  const s=d.sets[si];
  const ghost=(f)=>{ for(let j=si-1;j>=0;j--){ if(d.sets[j][f]) return d.sets[j][f]; } return (f==="peso" && ll && ll.carga)? ll.carga : ""; };
  const step=field==="peso"?(d.winc||1):1;
  const hasVal=(s[field]!=="" && s[field]!=null);
  const cur=numOf(hasVal?s[field]:ghost(field));
  const min=field==="peso"?0:1;
  const max=Math.max(field==="peso"?150:30, Math.ceil(cur/step)*step+10*step);
  const fmt=v=>field==="peso"?fmtNum(v):String(Math.round(v));
  let html="";
  for(let v=min;v<=max+1e-9;v+=step){ const val=fmt(v); html+='<button class="vs-it'+((hasVal&&numOf(val)===cur)?" on":"")+'" data-val="'+val+'">'+val+'</button>'; }
  strip.innerHTML=html; strip.classList.remove("hide");
  const setVal=(val)=>{ s[field]=val; if(field==="reps") delete s.pre; };
  strip.querySelectorAll(".vs-it").forEach(b=>b.onclick=()=>{ setVal(b.dataset.val); openStrip=null; persist(); renderSetList(card,e,d,ll); updateFinishBar(); });
  // centraliza o valor atual (ou o fantasma); se estiver fora da grade do passo, centraliza o mais próximo
  let target=strip.querySelector(".vs-it.on");
  if(!target && cur>0){ let bd=1e9; for(const ch of strip.children){ const dd=Math.abs(numOf(ch.dataset.val)-cur); if(dd<bd){ bd=dd; target=ch; } } }
  requestAnimationFrame(()=>{ const t=target||strip.children[Math.min(4,strip.children.length-1)]; if(t) strip.scrollLeft=t.offsetLeft-strip.clientWidth/2+t.offsetWidth/2; });
  // rolar também escolhe: só depois de o USUÁRIO tocar/rolar a régua (nunca pelo scroll programático/snap inicial)
  let tm=null, armed=false;
  ["touchstart","pointerdown","mousedown","wheel"].forEach(ev=>strip.addEventListener(ev,()=>{ armed=true; },{passive:true}));
  strip.addEventListener("scroll",()=>{ if(!armed) return; clearTimeout(tm); tm=setTimeout(()=>{
    const cx=strip.scrollLeft+strip.clientWidth/2; let best=null,bd=1e9;
    for(const ch of strip.children){ const c=ch.offsetLeft+ch.offsetWidth/2, dd=Math.abs(c-cx); if(dd<bd){bd=dd;best=ch;} }
    if(best && best.dataset.val!==String(s[field])){
      setVal(best.dataset.val); persist(); updateFinishBar();
      strip.querySelectorAll(".vs-it").forEach(x=>x.classList.toggle("on",x===best));
      const vbtn=blk.querySelector('[data-copy="'+field+'"]');
      if(vbtn) vbtn.innerHTML=field==="peso"?(esc(s[field])+' <span class="u">kg</span>'):esc(s[field]);
    }
  },150); },{passive:true});
}

function hasLoggedData(d){ return !!(d&&d.ex)&&Object.keys(d.ex).some(id=>{ const e=d.ex[id]; return Array.isArray(e.sets)&&e.sets.some(s=>s.done||s.peso||s.esf||(s.reps&&!s.pre)); }); } // reps pré-preenchida (s.pre) não conta
function switchSession(k){
  if(!draft){ ensureDraft(); }
  if(draft.session===k) return;
  const go=function(){
    const keep={ date:draft.date, created:draft.created, autoreg:draft.autoreg, peso:draft.peso, pesoEdit:draft.pesoEdit, pesoHK:draft.pesoHK, gym:draft.gym, meals:draft.meals, kcal:draft.kcal, bpm:draft.bpm, crono:draft.crono, crise:draft.crise, criseDone:draft.criseDone, nota:draft.nota }; // check-in/crise do dia e cronômetro sobrevivem à troca de sessão
    draft=freshDraft(k);
    Object.assign(draft, keep);
    persist(); renderHoje();
  };
  if(hasLoggedData(draft)){ appConfirm("Você já registrou séries nesta sessão. Trocar de treino vai apagar o registro de hoje.",go); return; }
  go();
}

/* ---------- cronômetro do treino (Iniciar → Pausar/Retomar; duração vai pro registro) ---------- */
function cronoState(){ if(!draft.crono||typeof draft.crono!=="object") draft.crono={el:0,run:false,ts:null}; return draft.crono; }
function cronoElapsed(){ const c=cronoState(); return Math.max(0,Math.round(c.el + (c.run&&c.ts ? (Date.now()-c.ts)/1000 : 0))); }
function cronoToggle(){
  const c=cronoState();
  if(c.run){ c.el=cronoElapsed(); c.run=false; c.ts=null; }   // pausa
  else { c.ts=Date.now(); c.run=true; }                        // inicia / retoma
  persist(); updateFinishBar();
}
function fmtCrono(s){ s=Math.max(0,Math.round(s)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return (h?h+":"+String(m).padStart(2,"0"):String(m))+":"+String(ss).padStart(2,"0"); }
function fmtDur(s){ const m=Math.round(s/60); if(m<1) return Math.round(s)+"s"; if(m<60) return m+" min"; return Math.floor(m/60)+"h"+String(m%60).padStart(2,"0"); }
function cronoTick(){ if(currentTab!=="hoje"||!draft||!draft.crono||!draft.crono.run) return; const bc=$("#btnCrono"); if(bc) bc.textContent="⏸ "+fmtCrono(cronoElapsed()); }

/* confirmação em folha (confirm() também não aparece no PWA standalone do iOS) */
let sheetOnDismiss=null; // appConfirm pendente: fechar por scrim/gesto = Cancelar (senão Promises de consentimento ficam penduradas pra sempre)
function appConfirm(msg,onYes,onNo){
  const sheet=$("#sheet");
  sheet.innerHTML=`<div class="grab"></div>
    <h2>Confirmar</h2>
    <div class="sub">${esc(msg)}</div>

function updateFinishBar(){
  const bar=$("#finishbar");
  if(currentTab!=="hoje"){ bar.classList.add("hidden"); return; }
  bar.classList.remove("hidden");
  // botão descartar: só aparece quando há algo a perder (cronômetro iniciado ou séries/protocolo registrados)
  const bd=$("#btnDiscard");
  if(bd){ const c=cronoState(); const started=hasLoggedData(draft)||draft.z2only||draft.criseDone||(draft.crise&&draft.nota)||c.run||c.el>0; bd.classList.toggle("hidden",!started); }
  // dia de crise/protocolo: sem grade de séries — a barra reflete o protocolo, não exercícios
  if(criseHoje()&&draft.date===todayStr()){
    const fill=$("#pbarFill"); if(fill) fill.style.width=(draft.criseDone?100:0)+"%";
    const cnt=$("#exCount"); if(cnt) cnt.textContent=draft.criseDone?"protocolo ✓":"protocolo";
    $("#finMeta").innerHTML = redflagHoje()?`<b>Atendimento</b>`:(`<b>Protocolo</b>`+(draft.criseDone?" ✓":""));
    const bcx=$("#btnCrono"); if(bcx){ const c=cronoState(); const st=c.run||c.el>0; bcx.className="btn-crono"+(c.run?" run":(st?" paused":"")); bcx.textContent=c.run?"⏸ "+fmtCrono(cronoElapsed()):(st?"▶ "+fmtCrono(c.el):"▶ Iniciar"); }
    return;
  }
  let total=0,doneN=0;
  if(!(draft.autoreg==="r"&&draft.z2only)){
    const full=sessExList(draft.session);
    const list=draft.autoreg==="r"?full.slice(0,3):full;
    list.forEach(e=>{
      const d=draft.ex[e.id];
      if(d && Array.isArray(d.sets)){ const work=d.sets.filter(s=>!s.w); total+=work.length; doneN+=work.filter(s=>s.done).length; }
      else { total+=adjTarget(e).sets; }
    });
  }
  const cnt=$("#exCount"); if(cnt) cnt.textContent=doneN+"/"+total+" séries";
  const fill=$("#pbarFill"); if(fill) fill.style.width=(total?(doneN/total*100):100)+"%";
  $("#finMeta").innerHTML = draft.z2only?`<b>Zona 2</b>`:`<b>${doneN}</b>/${total} séries`;
  const bc=$("#btnCrono");
  if(bc){ const c=cronoState(); const started=c.run||c.el>0;
    bc.className="btn-crono"+(c.run?" run":(started?" paused":""));
    bc.textContent=c.run ? "⏸ "+fmtCrono(cronoElapsed()) : (started ? "▶ "+fmtCrono(c.el) : "▶ Iniciar");
  }
}

/* ============================================================
   FINALIZAR & EXPORTAR
   ============================================================ */
function cell(s){ return String(s==null?"":s).replace(/\|/g,"/").replace(/\r?\n/g," ").trim(); }

/* ---------- resumo do treino: séries, volume, comparativo, músculos, nota 0–10 ---------- */
function workSetsOf(rec){ let total=0,done=0; Object.values(rec.ex||{}).forEach(d=>{ if(Array.isArray(d.sets)) d.sets.forEach(s=>{ if(!s.w){ total++; if(s.done) done++; } }); }); return {total:total,done:done}; }
function volumeOf(rec){ let v=0; Object.values(rec.ex||{}).forEach(d=>{ if(Array.isArray(d.sets)) d.sets.forEach(s=>{ if(!s.w&&s.done) v+=numOf(s.peso)*numOf(s.reps); }); }); return Math.round(v); }
function topSetOf(d){ if(!d) return null; if(!Array.isArray(d.sets)) return (d.carga||d.reps)?{peso:d.carga||"",reps:d.reps||""}:null; /* formato antigo */ let best=null; d.sets.forEach(s=>{ if(!s.w&&(s.done||s.esf)&&(s.peso||s.reps)&&(!best||numOf(s.peso)>numOf(best.peso))) best=s; }); return best; } // só séries realizadas (✓/esforço) contam
function prevSameSession(rec){ let prev=null; history.forEach(h=>{ if(h.session===rec.session&&h.date<rec.date&&(!prev||h.date>prev.date)) prev=h; }); return prev; }
function musclesOf(rec){ const g={}; Object.entries(rec.ex||{}).forEach(([id,d])=>{ if(!Array.isArray(d.sets)) return; const n=d.sets.filter(s=>!s.w&&s.done).length; if(!n) return; const grp=(EXMETA[id]||{}).g||"outro"; g[grp]=(g[grp]||0)+n; }); return g; }
function prCount(rec){
  let n=0;
  Object.entries(rec.ex||{}).forEach(([id,d])=>{
    const t=topSetOf(d); if(!t) return; const cur=numOf(t.peso); if(cur<=0) return;
    let best=0,has=false;
    history.forEach(h=>{ if(h.date>=rec.date) return; const e=h.ex&&h.ex[id]; if(!e) return;
      if(Array.isArray(e.sets)) e.sets.forEach(s=>{ if(!s.w&&(s.done||s.esf)){ const p=numOf(s.peso); if(p>0){ has=true; if(p>best) best=p; } } });
      else if(e.carga){ const p=numOf(e.carga); if(p>0){ has=true; if(p>best) best=p; } } });
    if(has&&cur>best) n++;
